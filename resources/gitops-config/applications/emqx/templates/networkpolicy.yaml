apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: emqx
  namespace: emqx
spec:
  endpointSelector: {}
  ingress:
  # Dashboard via svc-gateway
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "18083"
        protocol: TCP
  # MQTT from cluster clients — use cluster+host because HA uses hostNetwork=true
  - fromEntities:
    - cluster
    - host
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
  # EMQX cluster internal communication
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "4370"
        protocol: TCP
      - port: "5369"
        protocol: TCP
      - port: "18083"
        protocol: TCP
  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "18083"
        protocol: TCP
  # emqx-saml-metadata static server -- only EMQX itself needs this
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  # EMQX cluster internal communication
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "4370"
        protocol: TCP
      - port: "5369"
        protocol: TCP
      - port: "18083"
        protocol: TCP
  # kube-apiserver (for service discovery)
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  # Authentik SAML metadata fetch (one-time, at SSO config save). EMQX's SAML
  # Metadata URL points at the in-namespace emqx-saml-metadata static server
  # (hand-patched copy of Authentik's metadata, see saml-metadata-server.yaml
  # for why), not at Authentik directly -- so no cross-namespace rule is
  # needed here, only the intra-namespace rule below covers it.
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
        app: emqx-saml-metadata
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
