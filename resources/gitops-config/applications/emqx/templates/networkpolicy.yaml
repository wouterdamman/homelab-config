apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: emqx
  namespace: emqx
spec:
  endpointSelector: {}
  ingress:
  # Dashboard via svc-gateway
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "18083"
        protocol: TCP
  # MQTT from cluster clients — use cluster+host because HA uses hostNetwork=true
  - fromEntities:
    - cluster
    - host
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
  # EMQX cluster internal communication
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "4370"
        protocol: TCP
      - port: "5369"
        protocol: TCP
      - port: "18083"
        protocol: TCP
  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "18083"
        protocol: TCP
  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  # EMQX cluster internal communication
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "4370"
        protocol: TCP
      - port: "5369"
        protocol: TCP
      - port: "18083"
        protocol: TCP
  # kube-apiserver (for service discovery)
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  # Authentik OIDC (discovery doc + token exchange via app-gateway at sso.app.damman.tech)
  # Cilium classifies LB-IPAM IPs as world (not cluster)
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  # Authentik OIDC backend calls (discovery/token/userinfo) — internal service.
  # In-cluster pods hairpinning back through app-gateway to sso.app.damman.tech get
  # blocked (Cilium Gateway dataplane denies hairpin traffic with a generic 403).
  # EMQX's native OIDC client has no separate auth/token/userinfo endpoint override
  # (unlike Grafana's generic_oauth), so it must reach Authentik internally for all of it.
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: authentik
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: server
    toPorts:
    - ports:
      - port: "9000"
        protocol: TCP
