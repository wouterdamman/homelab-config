apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: emqx
  namespace: emqx
spec:
  endpointSelector: {}
  ingress:
  # Dashboard via svc-gateway
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "18083"
        protocol: TCP
  # MQTT from cluster clients — use cluster+host because HA uses hostNetwork=true
  - fromEntities:
    - cluster
    - host
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
  # EMQX cluster internal communication
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "4370"
        protocol: TCP
      - port: "5369"
        protocol: TCP
      - port: "18083"
        protocol: TCP
  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "18083"
        protocol: TCP
  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  # EMQX cluster internal communication
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "4370"
        protocol: TCP
      - port: "5369"
        protocol: TCP
      - port: "18083"
        protocol: TCP
  # kube-apiserver (for service discovery)
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  # Authentik OIDC (discovery doc + token exchange via app-gateway at sso.app.damman.tech)
  # CoreDNS rewrites this hostname to the gateway's ClusterIP in-cluster (see
  # cluster-config), which avoids the Cilium Gateway's anti-hairpin block on its
  # own announced VIP. The gateway's Envoy is the per-node Cilium agent itself
  # (hostNetwork), so the ClusterIP destination is "host"/"remote-node" identity,
  # not "world" -- both are needed alongside world (external OIDC providers,
  # webhooks, etc., for apps that don't route through this gateway pattern).
  - toEntities:
    - world
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
