# Static file server serving a hand-patched copy of Authentik's SAML IdP
# metadata for the EMQX provider. Needed because EMQX's SAML client (esaml)
# has a binding mismatch bug: it only ever reads the metadata's HTTP-POST
# SingleSignOnService Location, but always sends the AuthnRequest using
# HTTP-Redirect encoding (GET + deflated query param) regardless of which
# binding the URL was meant for. Authentik's real POST endpoint expects a
# POST body and rejects the GET with "SAML payload missing". This file
# patches the HTTP-POST entry's Location to point at the redirect-binding
# endpoint instead, so esaml's GET-based request lands somewhere that
# actually accepts it. The original XML-DSig signature on the document is
# dropped since it's no longer valid after this edit; metadata signing is
# optional in SAML and esaml does not verify it, only the IdP signing cert
# inside KeyDescriptor (kept verbatim) for validating actual SAML Responses.
#
# Served same-namespace, no Gateway involved, to avoid Cilium's Gateway API
# anti-hairpin protection (see emqx CiliumNetworkPolicy and configmap-coredns
# in cluster-config for the wider context).
apiVersion: v1
kind: ConfigMap
metadata:
  name: emqx-saml-metadata
  namespace: emqx
data:
  metadata.xml: |
    <md:EntityDescriptor xmlns:saml="urn:oasis:names:tc:SAML:2.0:assertion" xmlns:md="urn:oasis:names:tc:SAML:2.0:metadata" xmlns:ds="http://www.w3.org/2000/09/xmldsig#" entityID="https://emqx.svc.damman.tech/api/v5/sso/saml/metadata"><md:IDPSSODescriptor protocolSupportEnumeration="urn:oasis:names:tc:SAML:2.0:protocol"><md:KeyDescriptor use="signing"><ds:KeyInfo><ds:X509Data><ds:X509Certificate></ds:X509Certificate></ds:X509Data></ds:KeyInfo></md:KeyDescriptor><md:SingleLogoutService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect" Location="https://sso.app.damman.tech/application/saml/emqx-dashboard/slo/binding/redirect/"/><md:SingleLogoutService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST" Location="https://sso.app.damman.tech/application/saml/emqx-dashboard/slo/binding/post/"/><md:NameIDFormat>urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress</md:NameIDFormat><md:NameIDFormat>urn:oasis:names:tc:SAML:2.0:nameid-format:persistent</md:NameIDFormat><md:NameIDFormat>urn:oasis:names:tc:SAML:1.1:nameid-format:X509SubjectName</md:NameIDFormat><md:NameIDFormat>urn:oasis:names:tc:SAML:2.0:nameid-format:transient</md:NameIDFormat><md:SingleSignOnService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect" Location="https://sso.app.damman.tech/application/saml/emqx-dashboard/sso/binding/redirect/"/><md:SingleSignOnService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST" Location="https://sso.app.damman.tech/application/saml/emqx-dashboard/sso/binding/redirect/"/></md:IDPSSODescriptor></md:EntityDescriptor>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx-saml-metadata
  namespace: emqx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx-saml-metadata
  template:
    metadata:
      labels:
        app: emqx-saml-metadata
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.27-alpine
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: metadata
          mountPath: /usr/share/nginx/html/metadata.xml
          subPath: metadata.xml
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: var-cache
          mountPath: /var/cache/nginx
        - name: var-run
          mountPath: /var/run
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
      volumes:
      - name: metadata
        configMap:
          name: emqx-saml-metadata
      - name: tmp
        emptyDir: {}
      - name: var-cache
        emptyDir: {}
      - name: var-run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: emqx-saml-metadata
  namespace: emqx
spec:
  selector:
    app: emqx-saml-metadata
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
