replicaCount: 1

podManagementPolicy: Parallel

persistence:
  enabled: true
  size: 10Gi
  storageClassName: longhorn-standard
  accessMode: ReadWriteOnce

emqxConfig:
  EMQX_DASHBOARD__DEFAULT_USERNAME: ""
  EMQX_DASHBOARD__DEFAULT_PASSWORD: ""

externalSecrets:
  enabled: true
  items:
  - name: emqx-dashboard-secret
    secretStoreRef: onepassword-connect
    templateData:
      EMQX_DASHBOARD__DEFAULT_USERNAME:
        value: EMQX_DASHBOARD__DEFAULT_USERNAME
        isSecret: true
      EMQX_DASHBOARD__DEFAULT_PASSWORD:
        value: EMQX_DASHBOARD__DEFAULT_PASSWORD
        isSecret: true
      EMQX_DASHBOARD__SSO__OIDC__BACKEND:
        value: "oidc"
        isSecret: false
      EMQX_DASHBOARD__SSO__OIDC__ENABLE:
        value: "true"
        isSecret: false
      EMQX_DASHBOARD__SSO__OIDC__ISSUER:
        value: "https://sso.app.damman.tech/application/o/emqx-dashboard/"
        isSecret: false
      EMQX_DASHBOARD__SSO__OIDC__CLIENTID:
        value: EMQX_DASHBOARD__SSO__OIDC__CLIENTID
        isSecret: true
      EMQX_DASHBOARD__SSO__OIDC__SECRET:
        value: EMQX_DASHBOARD__SSO__OIDC__SECRET
        isSecret: true
      EMQX_DASHBOARD__SSO__OIDC__DASHBOARD_ADDR:
        value: "https://emqx.svc.damman.tech"
        isSecret: false
    data:
    - remoteKey: emqx-dashboard-password
      property: username
      secretKey: EMQX_DASHBOARD__DEFAULT_USERNAME
    - remoteKey: emqx-dashboard-password
      property: password
      secretKey: EMQX_DASHBOARD__DEFAULT_PASSWORD
    - remoteKey: emqx-oidc
      property: username
      secretKey: EMQX_DASHBOARD__SSO__OIDC__CLIENTID
    - remoteKey: emqx-oidc
      property: password
      secretKey: EMQX_DASHBOARD__SSO__OIDC__SECRET

envFromSecret: "emqx-dashboard-secret"

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  clusterIP: None
  mqtt: 1883
  mqttssl: 8883
  ws: 8083
  wss: 8084
  dashboard: 18083
  externalTrafficPolicy: "Cluster"

httproutes:
- enabled: true
  name: emqx-dashboard-httproute
  namespace: emqx
  hostname: emqx.svc.damman.tech
  gateway:
    name: svc-gateway
    namespace: kube-system
    sectionName: svc-https-listener
  path: /
  backend:
    name: emqx-emqx-enterprise
    port: 18083

metrics:
  enabled: false
  type: prometheus

serviceExternal:
  enabled: false
  # LoadBalancer removed 2026-01-28 after Home Assistant migration completed
  # All MQTT communication is now internal to the Kubernetes cluster
