{{- if .Values.ingress.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: evcc
  namespace: evcc
  labels:
    app.kubernetes.io/name: evcc
spec:
  parentRefs:
  - name: app-gateway
    namespace: kube-system
    sectionName: app-https-listener
  hostnames:
  - {{ .Values.ingress.hostname }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: evcc
      port: {{ .Values.service.port }}
{{- end }}
