{{- if .Values.ingress.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: evcc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: evcc
spec:
  parentRefs:
  - name: app-gateway
    namespace: kube-system
    sectionName: app-https-listener
  hostnames:
  - {{ .Values.ingress.hostname }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: evcc
      port: {{ .Values.service.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: evcc-ocpp
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: evcc
spec:
  parentRefs:
  - name: app-gateway
    namespace: kube-system
    sectionName: app-ocpp-listener
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    timeouts:
      backendRequest: 0s
    backendRefs:
    - name: evcc
      port: 8887
{{- end }}
