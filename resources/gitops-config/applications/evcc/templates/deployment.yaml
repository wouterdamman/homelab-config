apiVersion: apps/v1
kind: Deployment
metadata:
  name: evcc
  namespace: evcc
  labels:
    app.kubernetes.io/name: evcc
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: evcc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evcc
    spec:
      initContainers:
      - name: copy-config
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "Copying configuration from secret to data volume..."
          cp /app/readonly/evcc.yaml /data/evcc.yaml
          echo "Configuration copied successfully"
          ls -la /data/
        volumeMounts:
        - name: config-volume
          mountPath: /app/readonly
          readOnly: true
        - name: data
          mountPath: /data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      containers:
      - name: evcc
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: EVCC_CONFIG
          value: /data/evcc.yaml
        ports:
        - name: http
          containerPort: 7070
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config-volume
        secret:
          secretName: evcc-config
      - name: data
        persistentVolumeClaim:
          claimName: evcc-data
