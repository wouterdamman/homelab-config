apiVersion: apps/v1
kind: Deployment
metadata:
  name: evcc
  namespace: evcc
  labels:
    app.kubernetes.io/name: evcc
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: evcc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evcc
    spec:
      containers:
      - name: evcc
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 7070
          protocol: TCP
        volumeMounts:
        - name: config-volume
          mountPath: /etc/evcc.yaml
          subPath: evcc.yaml
          readOnly: true
        - name: data
          mountPath: /root/.evcc
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config-volume
        secret:
          secretName: evcc-config
      - name: data
        persistentVolumeClaim:
          claimName: evcc-data
