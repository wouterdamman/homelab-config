apiVersion: apps/v1
kind: Deployment
metadata:
  name: evcc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: evcc
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: evcc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evcc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: evcc
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: EVCC_DIR
          value: /data
        ports:
        - name: http
          containerPort: 7070
          protocol: TCP
        volumeMounts:
        - name: config-volume
          mountPath: /etc/evcc.yaml
          subPath: evcc.yaml
          readOnly: true
        - name: data
          mountPath: /data
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          readOnlyRootFilesystem: true
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config-volume
        secret:
          secretName: evcc-config
      - name: data
        persistentVolumeClaim:
          claimName: evcc-data
      - name: tmp
        emptyDir: {}
