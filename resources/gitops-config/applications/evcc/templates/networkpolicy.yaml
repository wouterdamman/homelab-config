apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: evcc
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: evcc

  ingress:
  # Web UI — from app-gateway
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "7070"
        protocol: TCP

  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "7070"
        protocol: TCP

  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

  # Cloud APIs (Tibber etc.) + local devices (solar inverter, EV charger via LAN)
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      - port: "443"
        protocol: TCP
      - port: "502"
        protocol: TCP
