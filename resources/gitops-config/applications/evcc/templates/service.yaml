apiVersion: v1
kind: Service
metadata:
  name: evcc
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: evcc
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: 8887
    targetPort: 8887
    protocol: TCP
    name: ocpp
  selector:
    app.kubernetes.io/name: evcc
