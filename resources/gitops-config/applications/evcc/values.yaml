# EVCC Configuration
# Solar charging for electric vehicles

image:
  repository: evcc/evcc
  tag: "0.312.1"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

storage:
  size: 2Gi
  storageClass: longhorn-standard

service:
  type: ClusterIP
  port: 7070

ingress:
  enabled: true
  hostname: evcc.app.damman.tech

# Configuration via ExternalSecret from 1Password
# Config is mounted at /etc/evcc.yaml, data stored in /root/.evcc
externalSecrets:
  enabled: true
  items:
  - name: evcc-config
    secretStoreRef: onepassword-connect
    data:
    - remoteKey: evcc-config
      secretKey: evcc.yaml
