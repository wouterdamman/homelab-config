---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: firefly
  namespace: firefly-iii
  labels:
    app.kubernetes.io/name: firefly-iii
    app.kubernetes.io/component: finance
spec:
  parentRefs:
    - name: app-gateway
      namespace: cilium-gateway
  hostnames:
    - "{{ .Values.ingress.hostname }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: firefly
          port: {{ .Values.service.port }}
