---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: firefly-secrets
  namespace: firefly-iii
spec:
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: firefly-secrets
    template:
      engineVersion: v2
      data:
        # Database configuration
        DB_CONNECTION: pgsql
        DB_HOST: "{{ .dbHost }}"
        DB_PORT: "{{ .dbPort }}"
        DB_DATABASE: "{{ .dbName }}"
        DB_USERNAME: "{{ .dbUsername }}"
        DB_PASSWORD: "{{ .dbPassword }}"

        # Application key (encryption)
        APP_KEY: "{{ .appKey }}"

        # OAuth2 configuration
        OAUTH_AUTHENTIK_CLIENT_ID: "{{ .oauthClientId }}"
        OAUTH_AUTHENTIK_CLIENT_SECRET: "{{ .oauthClientSecret }}"
  data:
    - secretKey: dbHost
      remoteRef:
        key: cnpg-shared-firefly
        property: host
    - secretKey: dbPort
      remoteRef:
        key: cnpg-shared-firefly
        property: port
    - secretKey: dbName
      remoteRef:
        key: cnpg-shared-firefly
        property: database
    - secretKey: dbUsername
      remoteRef:
        key: cnpg-shared-firefly
        property: username
    - secretKey: dbPassword
      remoteRef:
        key: cnpg-shared-firefly
        property: password
    - secretKey: appKey
      remoteRef:
        key: firefly-app-key
        property: key
    - secretKey: oauthClientId
      remoteRef:
        key: firefly-oauth
        property: client_id
    - secretKey: oauthClientSecret
      remoteRef:
        key: firefly-oauth
        property: client_secret
