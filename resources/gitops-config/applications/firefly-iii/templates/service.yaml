---
apiVersion: v1
kind: Service
metadata:
  name: firefly
  namespace: firefly-iii
  labels:
    app.kubernetes.io/name: firefly-iii
    app.kubernetes.io/component: finance
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: firefly-iii
