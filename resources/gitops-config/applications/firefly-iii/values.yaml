# Firefly III - Personal Finance Manager
# OAuth2/OIDC SSO via Authentik

image:
  repository: fireflyiii/core
  tag: "version-6.1.21"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

storage:
  size: 10Gi
  storageClass: longhorn-standard

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  hostname: budget.app.damman.tech
  className: cilium

# Database configuration (cnpg-shared)
database:
  connection: pgsql
  host: cnpg-shared-rw.cnpg-system.svc.cluster.local
  port: 5432
  database: firefly

# OAuth2/OIDC configuration (Authentik)
oauth:
  enabled: true
  provider: authentik

# App configuration
app:
  name: "Firefly III"
  url: https://budget.app.damman.tech
  timezone: Europe/Amsterdam
  locale: nl_NL
