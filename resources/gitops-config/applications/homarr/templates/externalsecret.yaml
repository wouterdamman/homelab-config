---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homarr-secrets
  namespace: homarr
spec:
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: homarr-secrets
    template:
      engineVersion: v2
      data:
        # Database configuration
        DB_HOST: '{{ `{{ .dbHost }}` }}'
        DB_PORT: '{{ `{{ .dbPort }}` }}'
        DB_NAME: '{{ `{{ .dbName }}` }}'
        DB_USER: '{{ `{{ .dbUser }}` }}'
        DB_PASSWORD: '{{ `{{ .dbPassword }}` }}'

        # Database URL (PostgreSQL connection string)
        DATABASE_URL: 'postgresql://{{ `{{ .dbUser }}` }}:{{ `{{ .dbPassword }}` }}@{{ `{{ .dbHost }}` }}:{{ `{{ .dbPort }}` }}/{{ `{{ .dbName }}` }}'

        # OIDC configuration
        AUTH_OIDC_CLIENT_ID: '{{ .Values.sso.clientId }}'
        AUTH_OIDC_CLIENT_SECRET: '{{ `{{ .oidcClientSecret }}` }}'
        AUTH_OIDC_ISSUER: '{{ .Values.sso.issuerUrl }}'
  data:
    - secretKey: dbHost
      remoteRef:
        key: cnpg-shared-homarr
        property: host
    - secretKey: dbPort
      remoteRef:
        key: cnpg-shared-homarr
        property: port
    - secretKey: dbName
      remoteRef:
        key: cnpg-shared-homarr
        property: database
    - secretKey: dbUser
      remoteRef:
        key: cnpg-shared-homarr
        property: username
    - secretKey: dbPassword
      remoteRef:
        key: cnpg-shared-homarr
        property: password
    - secretKey: oidcClientSecret
      remoteRef:
        key: homarr-oidc
        property: client_secret
