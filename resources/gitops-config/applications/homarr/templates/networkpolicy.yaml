apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: homarr
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: homarr

  ingress:
  # Web UI — from app-gateway
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "3000"
        protocol: TCP

  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "3000"
        protocol: TCP

  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

  # PostgreSQL (cnpg-shared)
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: cnpg-system
        cnpg.io/cluster: cnpg-shared
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP

  # Authentik OIDC (sso.app.damman.tech via app-gateway LB IP — Cilium sees as world)
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
