image:
  repository: ghcr.io/homarr-labs/homarr
  tag: v1.70.0
  pullPolicy: IfNotPresent

replicaCount: 1

# Homarr configuration
config:
  baseUrl: https://homarr.app.damman.tech
  timeZone: Europe/Amsterdam

# Database configuration (PostgreSQL via CNPG)
database:
  host: cnpg-shared-rw.cnpg-system.svc.cluster.local
  port: 5432
  name: homarr
  user: homarr

# OIDC/SSO Configuration (Authentik)
sso:
  enabled: true
  provider: oidc
  clientId: xsQOrUUzKH2dO7AEcMXJmTrZ2IfUrrk68fLvCCzT
  issuerUrl: https://sso.app.damman.tech/application/o/homarr/
  clientName: Authentik
  scopes: "openid email profile groups"
  groupsAttribute: groups
  autoLogin: false

# External Secrets
externalSecrets:
  enabled: true
  items:
  - name: homarr-secrets
    secretStoreRef: onepassword-connect
    templateData:
      # Database
      DB_HOST:
        value: cnpg-shared-rw.cnpg-system.svc.cluster.local
        isSecret: false
      DB_PORT:
        value: "5432"
        isSecret: false
      DB_NAME:
        value: homarr
        isSecret: false
      DB_USER:
        value: homarr
        isSecret: false
      DB_PASSWORD:
        value: DB_PASSWORD
        isSecret: true
      # Database URL (required by Homarr)
      DATABASE_URL:
        value: "postgresql://homarr:DB_PASSWORD@cnpg-shared-rw.cnpg-system.svc.cluster.local:5432/homarr"
        isSecret: true
      # OIDC
      AUTH_OIDC_CLIENT_ID:
        value: xsQOrUUzKH2dO7AEcMXJmTrZ2IfUrrk68fLvCCzT
        isSecret: false
      AUTH_OIDC_CLIENT_SECRET:
        value: OIDC_CLIENT_SECRET
        isSecret: true
      AUTH_OIDC_ISSUER:
        value: https://sso.app.damman.tech/application/o/homarr/
        isSecret: false
    data:
    - remoteKey: cnpg-shared-homarr
      property: password
      secretKey: DB_PASSWORD
    - remoteKey: homarr-oidc
      property: client_secret
      secretKey: OIDC_CLIENT_SECRET

# Service
service:
  type: ClusterIP
  port: 3000

# HTTPRoute
httproutes:
- enabled: true
  name: homarr-httproute
  namespace: homarr
  hostname: homarr.app.damman.tech
  path: /
  gateway:
    name: app-gateway
    namespace: kube-system
    sectionName: app-https-listener
  backend:
    name: homarr
    port: 3000

# Persistence for Homarr data
persistence:
  enabled: true
  size: 5Gi
  storageClassName: longhorn-standard
  accessMode: ReadWriteOnce

# Resources
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
