---
# Builds the GHCR pull secret for home-finance's private image. Must land
# before the chart's migrate-job PreSync hook (weight 0) tries to pull the
# image, so it's a PreSync hook itself at an earlier weight.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: home-finance
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-weight: "-1"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: ghcr-pull-secret
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .hostname }}":{"username":"{{ .username }}","password":"{{ .credential }}","auth":"{{ printf "%s:%s" .username .credential | b64enc }}"}}}
  data:
    - secretKey: hostname
      remoteRef:
        key: ghcr-pull-secret-home-finance
        property: hostname
    - secretKey: username
      remoteRef:
        key: ghcr-pull-secret-home-finance
        property: username
    - secretKey: credential
      remoteRef:
        key: ghcr-pull-secret-home-finance
        property: credential
