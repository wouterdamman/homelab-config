# Cluster-specific overrides for the home-finance chart. The chart's own
# defaults already target this stack (Gateway API + ESO + cnpg-shared +
# Cilium — see deploy/helm/home-finance/README.md upstream), so this file
# only needs the values that are genuinely environment-specific.

namespaceLabels:
  gateway.damman.tech/app-gateway: "true"

# GHCR package (ghcr.io/wouterdamman/home-finance) is private. Secret built
# by applications/home-finance/manifests/imagepullsecret.yaml.
imagePullSecrets:
  - name: ghcr-pull-secret

# Lists aren't deep-merged by Helm — must repeat the full entry, not just
# the hostname override.
httproutes:
  - enabled: true
    name: home-finance
    hostname: budget.app.damman.tech
    path: /
    gateway:
      name: app-gateway
      namespace: kube-system
      sectionName: app-https-listener
    backend:
      name: home-finance
      port: 80

oidc:
  issuerURL: https://sso.app.damman.tech/application/o/home-finance/
  clientID: jxSJ2L0WqBe95qwGrQklWVjWelNvIqkrruFC1dw0
  redirectURL: https://budget.app.damman.tech/auth/callback

# DB egress needs manual input since postgres.cnpg.enabled=false (external,
# shared cnpg-shared cluster) — chart can't know where that lives.
#
# OIDC egress: the chart's toFQDNs-derived rule (from oidc.issuerURL) did not
# work in this cluster — sso.app.damman.tech resolves to authentik-server's
# ClusterIP via split-horizon DNS, and that toFQDNs path was still blocked
# (root cause not fully isolated; toEndpoints against the known pod labels
# is the same proven mechanism already used for dbEgress, so using that
# instead here rather than block on it).
networkPolicy:
  cilium:
    prometheusNamespace: monitoring
    dbEgress:
      namespaceLabel: cnpg-system
      podLabels:
        cnpg.io/cluster: cnpg-shared
    extraEgress:
      - toEndpoints:
          - matchLabels:
              k8s:io.kubernetes.pod.namespace: authentik
              app.kubernetes.io/name: authentik
              app.kubernetes.io/component: server
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP

# Maps deep-merge with chart defaults, so only the new key is needed here.
env:
  INITIAL_ADMIN_EMAILS: wdamman@fastmail.com
