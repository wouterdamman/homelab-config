---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-outpost-codeserver-token
  namespace: home-assistant
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: authentik-outpost-codeserver-token
  data:
  - secretKey: token
    remoteRef:
      key: authentik-outpost-codeserver
      property: token
