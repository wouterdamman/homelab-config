{{- if .Values.gitCron.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "home-assistant.fullname" . }}-git-push
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.gitCron.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "home-assistant.fullname" . }}-git-cron
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: git-push
            image: bitnami/kubectl:latest
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            command:
            - /bin/sh
            - -c
            - |
              set -e
              HA_POD="{{ include "home-assistant.fullname" . }}-0"

              # Fix permissions via HA container (runs as root) so codeserver can
              # write into directories that HA created at runtime (e.g. themes/,
              # www/community/). Sets group-write + setgid so new subdirs inherit GID.
              echo "$(date '+%Y-%m-%d %H:%M:%S') Fixing /config directory permissions..."
              kubectl exec "${HA_POD}" -c home-assistant -- \
                sh -c 'find /config -type d -exec chmod g+rwxs {} + 2>/dev/null; find /config -type f -exec chmod g+rw {} + 2>/dev/null' || true

              # Git pull + push inside codeserver
              kubectl exec "${HA_POD}" -c codeserver -- /bin/sh -c '
                set -e
                cd /config
                export GIT_SSH_COMMAND="ssh -i /home/coder/.ssh/id_ed25519 -o UserKnownHostsFile=/home/coder/.ssh/known_hosts"

                # Ensure we are on a branch before pulling
                BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || echo "")
                if [ -z "${BRANCH}" ]; then
                  BRANCH=$(git remote show origin | awk "/HEAD branch/ {print \$NF}")
                  git checkout "${BRANCH}"
                fi

                echo "$(date +%Y-%m-%d\ %H:%M:%S) Pulling latest changes on ${BRANCH}..."
                git pull --rebase origin "${BRANCH}"

                git add -A
                if git diff --staged --quiet; then
                  echo "$(date +%Y-%m-%d\ %H:%M:%S) No changes to commit"
                  exit 0
                fi
                git commit -m "Auto: nightly backup $(date +%Y-%m-%d)"
                git push
                echo "$(date +%Y-%m-%d\ %H:%M:%S) Push successful"
              '
{{- end }}
