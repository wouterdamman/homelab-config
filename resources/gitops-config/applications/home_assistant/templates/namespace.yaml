apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    # PSS: privileged required — hostNetwork:true (mDNS device discovery) falls
    # under "host namespaces" which baseline disallows. Accepted risk, mitigated by:
    # capabilities.drop ALL, LSIO PUID 1000 (HA process non-root), seccompProfile
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/warn-version: latest
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/audit-version: latest
