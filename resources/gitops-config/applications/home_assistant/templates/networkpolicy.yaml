apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: home-assistant
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "home-assistant.name" . }}

  ingress:
  # HA web UI — from app-gateway (user-facing)
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "8123"
        protocol: TCP

  # Code-server — from svc-gateway (internal)
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "8443"
        protocol: TCP

  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "8123"
        protocol: TCP

  egress:
  # DNS — required for all name resolution
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

  # EMQX MQTT broker
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP

  # CNPG PostgreSQL — HA recorder database (cnpg-homeassistant cluster)
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: cnpg-system
        cnpg.io/cluster: cnpg-homeassistant
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP

  # LAN devices, cloud APIs, and external services
  # HA needs broad egress: device control, weather APIs, cloud integrations
  - toEntities:
    - world
    - cluster
