apiVersion: v1
kind: Service
metadata:
  name: {{ include "home-assistant.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "home-assistant.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
{{- if .Values.addons.codeserver.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "home-assistant.fullname" . }}-codeserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: codeserver
spec:
  type: {{ .Values.addons.codeserver.service.type | default "ClusterIP" }}
  selector:
    {{- include "home-assistant.selectorLabels" . | nindent 4 }}
  ports:
  - name: codeserver
    port: {{ .Values.addons.codeserver.service.port }}
    targetPort: codeserver
    protocol: TCP
{{- end }}
