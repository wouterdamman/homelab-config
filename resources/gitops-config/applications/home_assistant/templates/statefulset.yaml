apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "home-assistant.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "home-assistant.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "home-assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "home-assistant.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- if .Values.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- end }}

      # Pod-level security context
      securityContext:
        fsGroup: 911
        runAsUser: 911
        runAsGroup: 911

      # Init container to fix permissions for code-server
      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Fixing /config permissions for UID 911 (abc user)..."
          chown -R 911:911 /config
          chmod -R u+w /config
          echo "Permissions fixed successfully"
        volumeMounts:
        - name: config
          mountPath: /config
        securityContext:
          runAsUser: 0
          runAsGroup: 0

      containers:
      # Home Assistant main container
      - name: home-assistant
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8123
          protocol: TCP
        {{- if .Values.env }}
        env:
        {{- toYaml .Values.env | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /config
        {{- if .Values.externalSecrets.enabled }}
        {{- range .Values.externalSecrets.items }}
        - name: {{ .name }}
          mountPath: /config/{{ .secretKey }}
          subPath: {{ .secretKey }}
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if .Values.resources }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      {{- if .Values.addons.codeserver.enabled }}
      # Code-server sidecar container
      - name: codeserver
        image: ghcr.io/coder/code-server:latest
        imagePullPolicy: IfNotPresent
        args:
        - --auth
        - none
        - --user-data-dir
        - /config/.vscode
        - --extensions-dir
        - /config/.vscode-extensions
        - /config
        ports:
        - name: codeserver
          containerPort: 8080
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /config
        {{- if .Values.externalSecrets.enabled }}
        {{- range .Values.externalSecrets.items }}
        - name: {{ .name }}
          mountPath: /config/{{ .secretKey }}
          subPath: {{ .secretKey }}
          readOnly: true
        {{- end }}
        {{- end }}
        env:
        - name: TZ
          value: Europe/Amsterdam
        {{- if .Values.addons.codeserver.resources }}
        resources:
          {{- toYaml .Values.addons.codeserver.resources | nindent 10 }}
        {{- end }}
      {{- end }}

      volumes:
      {{- if .Values.externalSecrets.enabled }}
      {{- range .Values.externalSecrets.items }}
      - name: {{ .name }}
        secret:
          secretName: {{ .name }}
          defaultMode: 0440
      {{- end }}
      {{- end }}

  volumeClaimTemplates:
  - metadata:
      name: config
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size | default "10Gi" }}
