image:
  repository: ghcr.io/home-assistant/home-assistant
  tag: 2026.1.2
  pullPolicy: IfNotPresent

env:
- name: TZ
  value: Europe/Amsterdam

service:
  type: ClusterIP
  port: 8123
  annotations: {}

ingress:
  enabled: false

hostNetwork: true

dnsPolicy: ClusterFirstWithHostNet

persistence:
  enabled: true

controller:
  type: Deployment

addons:
  codeserver:
    enabled: true
    service:
      type: ClusterIP
      port: 12321
    ingress:
      enabled: false
      tls: []
    additionalMounts: []

httproutes:
- enabled: true
  name: ha-httproute
  namespace: home-assistant
  hostname: ha.app.damman.tech
  path: /
  gateway:
    name: app-gateway
    namespace: kube-system
    sectionName: app-https-listener
  backend:
    name: home-assistant
    port: 8123

- enabled: true
  name: codeserver-httproute
  namespace: home-assistant
  hostname: codeserver.app.damman.tech
  path: /
  gateway:
    name: app-gateway
    namespace: kube-system
    sectionName: app-https-listener
  backend:
    name: home-assistant-codeserver
    port: 12321
