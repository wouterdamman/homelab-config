apiVersion: batch/v1
kind: Job
metadata:
  name: lucidvault-couchdb-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: couchdb-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lucidvault
        app.kubernetes.io/component: couchdb-init
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: init
        image: curlimages/curl:8
        command: ["/bin/sh", "/scripts/init.sh"]
        env:
        - name: COUCHDB_USER
          valueFrom:
            secretKeyRef:
              name: lucidvault-couchdb-secrets
              key: COUCHDB_USER
        - name: COUCHDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lucidvault-couchdb-secrets
              key: COUCHDB_PASSWORD
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: scripts
        configMap:
          name: lucidvault-couchdb-init
          defaultMode: 0755
