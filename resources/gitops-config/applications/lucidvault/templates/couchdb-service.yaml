  name: lucidvault-couchdb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: couchdb
spec:
  type: ClusterIP
  ports:
  - port: 5984
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: couchdb
