apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lucidvault-couchdb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: couchdb
spec:
  serviceName: lucidvault-couchdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lucidvault
      app.kubernetes.io/component: couchdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lucidvault
        app.kubernetes.io/component: couchdb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 5984
        runAsGroup: 5984
        fsGroup: 5984
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: couchdb
        image: couchdb:3
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5984
          protocol: TCP
        env:
        - name: COUCHDB_USER
          valueFrom:
            secretKeyRef:
              name: lucidvault-couchdb-secrets
              key: COUCHDB_USER
        - name: COUCHDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lucidvault-couchdb-secrets
              key: COUCHDB_PASSWORD
        - name: COUCHDB_SECRET
          valueFrom:
            secretKeyRef:
              name: lucidvault-couchdb-secrets
              key: COUCHDB_SECRET
        volumeMounts:
        - name: couchdb-data
          mountPath: /opt/couchdb/data
        - name: config
          mountPath: /opt/couchdb/etc/local.d/local.ini
          subPath: local.ini
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /_up
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_up
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: lucidvault-couchdb-config
  volumeClaimTemplates:
  - metadata:
      name: couchdb-data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn-standard
      resources:
        requests:
          storage: 5Gi
