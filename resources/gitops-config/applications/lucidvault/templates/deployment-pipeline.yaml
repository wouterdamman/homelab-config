apiVersion: apps/v1
kind: Deployment
metadata:
  name: lucidvault-pipeline
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: lucidvault
      app.kubernetes.io/component: pipeline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lucidvault
        app.kubernetes.io/component: pipeline
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pipeline
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: lucidvault-secrets
              key: OLLAMA_API_KEY
        - name: RAINDROP_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: lucidvault-secrets
              key: RAINDROP_ACCESS_TOKEN
        - name: SUPADATA_API_KEY
          valueFrom:
            secretKeyRef:
              name: lucidvault-secrets
              key: SUPADATA_API_KEY
        - name: VAULT_PATH
          value: {{ .Values.pipeline.env.VAULT_PATH | quote }}
        - name: POLL_INTERVAL
          value: {{ .Values.pipeline.env.POLL_INTERVAL | quote }}
        - name: OLLAMA_MODEL
          value: {{ .Values.pipeline.env.OLLAMA_MODEL | quote }}
        volumeMounts:
        - name: vault
          mountPath: /vault
        - name: soul
          mountPath: /vault/soul.md
          subPath: soul.md
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          {{- toYaml .Values.pipeline.resources | nindent 10 }}
      volumes:
      - name: vault
        persistentVolumeClaim:
          claimName: lucidvault-vault
      - name: soul
        configMap:
          name: lucidvault-soul
