{{- range .Values.httproutes }}
{{- if .enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
spec:
  parentRefs:
  - name: {{ .gateway.name }}
    namespace: {{ .gateway.namespace }}
    sectionName: {{ .gateway.sectionName }}
  hostnames:
  - {{ .hostname }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .path }}
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
        - name: Host
          value: localhost
    backendRefs:
    - name: {{ .backend.name }}
      port: {{ .backend.port }}
{{- end }}
{{- end }}
