apiVersion: v1
kind: ConfigMap
metadata:
  name: lucidvault-livesync-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: livesync-bridge
data:
  config.json.tmpl: |
    {
      "peers": [
        {
          "type": "couchdb",
          "name": "lucidvault-remote",
          "group": "main",
          "database": "lucidvault",
          "username": "__COUCHDB_USER__",
          "password": "__COUCHDB_PASSWORD__",
          "url": "http://lucidvault-couchdb:5984",
          "passphrase": "__LIVESYNC_PASSPHRASE__",
          "useRemoteTweaks": true
        },
        {
          "type": "storage",
          "name": "lucidvault-storage",
          "group": "main",
          "baseDir": "./data/"
        }
      ]
    }
