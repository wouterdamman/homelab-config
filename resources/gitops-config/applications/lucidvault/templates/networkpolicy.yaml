apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: lucidvault
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {}

  ingress:
  # MCP HTTP — from svc-gateway
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  # CouchDB — from svc-gateway and same-namespace clients (livesync-bridge, init-job)
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "5984"
        protocol: TCP

  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

  # CouchDB — livesync-bridge and init-job → couchdb within namespace
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: lucidvault
        app.kubernetes.io/name: lucidvault
        app.kubernetes.io/component: couchdb
    toPorts:
    - ports:
      - port: "5984"
        protocol: TCP

  # Ollama Cloud + Raindrop + Supadata — all external HTTPS APIs
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
