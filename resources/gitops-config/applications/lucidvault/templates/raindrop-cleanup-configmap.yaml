apiVersion: v1
kind: ConfigMap
metadata:
  name: lucidvault-raindrop-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: raindrop-cleanup
data:
  cleanup.py: |
    import os
    import sys
    import requests
    from datetime import datetime, timezone, timedelta

    API_BASE = "https://api.raindrop.io/rest/v1"
    TOKEN = os.environ["RAINDROP_ACCESS_TOKEN"]
    HEADERS = {"Authorization": f"Bearer {TOKEN}"}
    CUTOFF = datetime.now(timezone.utc) - timedelta(days=3)


    def fetch_all_bookmarks():
        bookmarks = []
        page = 0
        while True:
            resp = requests.get(
                f"{API_BASE}/raindrops/0",
                headers=HEADERS,
                params={"page": page, "perpage": 50},
                timeout=30,
            )
            resp.raise_for_status()
            items = resp.json().get("items", [])
            bookmarks.extend(items)
            if len(items) < 50:
                break
            page += 1
        return bookmarks


    def main():
        bookmarks = fetch_all_bookmarks()
        deleted = 0
        skipped = 0

        for bm in bookmarks:
            created_str = bm.get("created", "")
            created = datetime.fromisoformat(created_str.replace("Z", "+00:00"))
            if created < CUTOFF:
                resp = requests.delete(
                    f"{API_BASE}/raindrop/{bm['_id']}",
                    headers=HEADERS,
                    timeout=30,
                )
                resp.raise_for_status()
                print(
                    f"DELETED id={bm['_id']} "
                    f"title={bm.get('title', '').strip()!r} "
                    f"url={bm.get('link', '')} "
                    f"created={created_str}"
                )
                deleted += 1
            else:
                skipped += 1

        print(f"Summary: deleted={deleted} skipped={skipped} total={len(bookmarks)}")


    if __name__ == "__main__":
        main()
