apiVersion: batch/v1
kind: CronJob
metadata:
  name: lucidvault-raindrop-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lucidvault
    app.kubernetes.io/component: raindrop-cleanup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: lucidvault
            app.kubernetes.io/component: raindrop-cleanup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: cleanup
            image: python:3.12-slim
            command: ["sh", "-c", "pip install requests -q && python /scripts/cleanup.py"]
            envFrom:
            - secretRef:
                name: lucidvault-secrets
            volumeMounts:
            - name: scripts
              mountPath: /scripts
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
          volumes:
          - name: scripts
            configMap:
              name: lucidvault-raindrop-cleanup
