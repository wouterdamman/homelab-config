{{- if .Values.sso.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-config
  namespace: netbox
data:
  extra.py: |
    import os

    # OIDC/OAuth2 Configuration for Authentik
    REMOTE_AUTH_ENABLED = True
    REMOTE_AUTH_BACKEND = 'social_core.backends.open_id_connect.OpenIdConnectAuth'
    REMOTE_AUTH_AUTO_CREATE_USER = True

    # Social auth configuration
    AUTHENTICATION_BACKENDS = (
        'social_core.backends.open_id_connect.OpenIdConnectAuth',
        'netbox.authentication.RemoteUserBackend',
    )

    # OIDC settings
    SOCIAL_AUTH_OIDC_OIDC_ENDPOINT = '{{ .Values.sso.issuerUrl }}'
    SOCIAL_AUTH_OIDC_KEY = '{{ .Values.sso.clientId }}'
    SOCIAL_AUTH_OIDC_SECRET = os.environ.get('SOCIAL_AUTH_OIDC_SECRET')

    # Login URLs
    LOGIN_URL = '/oauth/login/oidc/'
    LOGIN_REDIRECT_URL = '/'

    # Additional OIDC configuration
    SOCIAL_AUTH_OIDC_SCOPE = {{ .Values.sso.scopes | splitList " " | toJson }}
    SOCIAL_AUTH_OIDC_USERNAME_KEY = 'preferred_username'

    # Custom user details extraction that handles missing fields
    def get_user_details(strategy, details, backend, user=None, *args, **kwargs):
        """Extract user details from OIDC response with fallbacks for required fields"""
        # Get the original details
        out = {
            'username': details.get('username'),
            'email': details.get('email', ''),
            'first_name': details.get('first_name', ''),
            'last_name': details.get('last_name', ''),
        }

        # Handle missing last_name (required by NetBox)
        if not out['last_name']:
            # Try to split full name if available
            full_name = details.get('fullname') or details.get('first_name', '')
            name_parts = full_name.split(' ', 1) if full_name else []

            if len(name_parts) == 2:
                out['first_name'] = name_parts[0]
                out['last_name'] = name_parts[1]
            elif len(name_parts) == 1:
                out['first_name'] = name_parts[0]
                out['last_name'] = name_parts[0]  # Use same as first_name
            else:
                out['first_name'] = out.get('username', 'User')
                out['last_name'] = out.get('username', 'User')

        return {'details': out}

    # Override the user_details pipeline function
    import sys
    from types import ModuleType

    # Create a module to hold our custom function
    custom_pipeline = ModuleType('netbox_custom_pipeline')
    custom_pipeline.get_user_details = get_user_details
    sys.modules['netbox_custom_pipeline'] = custom_pipeline

    SOCIAL_AUTH_PIPELINE = (
        'social_core.pipeline.social_auth.social_details',
        'social_core.pipeline.social_auth.social_uid',
        'social_core.pipeline.social_auth.auth_allowed',
        'social_core.pipeline.social_auth.social_user',
        'social_core.pipeline.user.get_username',
        'social_core.pipeline.user.create_user',
        'social_core.pipeline.social_auth.associate_user',
        'social_core.pipeline.social_auth.load_extra_data',
        'netbox_custom_pipeline.get_user_details',  # Custom user details handler
    )

    # User attribute mapping
    SOCIAL_AUTH_OIDC_USER_FIELDS = {
        'username': 'preferred_username',
        'email': 'email',
        'first_name': 'given_name',
        'last_name': 'family_name',
    }
{{- end }}
