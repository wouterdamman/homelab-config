apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbox
  namespace: netbox
  labels:
    app.kubernetes.io/name: netbox
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: netbox
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbox
        app.kubernetes.io/component: web
    spec:
      containers:
      - name: netbox
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Database configuration
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_PASSWORD
        # Redis configuration
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_PORT
        - name: REDIS_CACHE_HOST
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_HOST
        - name: REDIS_CACHE_PORT
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_PORT
        # NetBox configuration
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: SECRET_KEY
        - name: ALLOWED_HOSTS
          value: "{{ .Values.config.allowedHosts }}"
        - name: TIME_ZONE
          value: "{{ .Values.config.timeZone }}"
        - name: SUPERUSER_NAME
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: SUPERUSER_NAME
        - name: SUPERUSER_EMAIL
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: SUPERUSER_EMAIL
        - name: SUPERUSER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: SUPERUSER_PASSWORD
        - name: SUPERUSER_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: SUPERUSER_API_TOKEN
        - name: SKIP_SUPERUSER
          value: "false"
        {{- if .Values.sso.enabled }}
        # OIDC Configuration
        - name: SOCIAL_AUTH_OIDC_SECRET
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: OIDC_CLIENT_SECRET
        {{- end }}
        volumeMounts:
        - name: media
          mountPath: /opt/netbox/netbox/media
        {{- if .Values.sso.enabled }}
        - name: config
          mountPath: /etc/netbox/config/extra.py
          subPath: extra.py
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /login/
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /login/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: media
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: netbox-media
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- if .Values.sso.enabled }}
      - name: config
        configMap:
          name: netbox-config
      {{- end }}
