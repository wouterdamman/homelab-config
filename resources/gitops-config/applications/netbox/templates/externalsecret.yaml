---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-secrets
  namespace: netbox
spec:
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: netbox-secrets
    template:
      engineVersion: v2
      data:
        # Database configuration
        DB_HOST: '{{ `{{ .dbHost }}` }}'
        DB_PORT: '{{ `{{ .dbPort }}` }}'
        DB_NAME: '{{ `{{ .dbName }}` }}'
        DB_USER: '{{ `{{ .dbUser }}` }}'
        DB_PASSWORD: '{{ `{{ .dbPassword }}` }}'

        # Redis configuration
        REDIS_HOST: netbox-redis
        REDIS_PORT: "6379"

        # NetBox secret key
        SECRET_KEY: '{{ `{{ .secretKey }}` }}'

        # Superuser configuration
        SUPERUSER_NAME: admin
        SUPERUSER_EMAIL: admin@damman.tech
        SUPERUSER_PASSWORD: '{{ `{{ .superuserPassword }}` }}'
        SUPERUSER_API_TOKEN: '{{ `{{ .superuserApiToken }}` }}'

        # OIDC configuration
        OIDC_CLIENT_SECRET: '{{ `{{ .oidcClientSecret }}` }}'
  data:
    - secretKey: dbHost
      remoteRef:
        key: cnpg-shared-netbox
        property: host
    - secretKey: dbPort
      remoteRef:
        key: cnpg-shared-netbox
        property: port
    - secretKey: dbName
      remoteRef:
        key: cnpg-shared-netbox
        property: database
    - secretKey: dbUser
      remoteRef:
        key: cnpg-shared-netbox
        property: username
    - secretKey: dbPassword
      remoteRef:
        key: cnpg-shared-netbox
        property: password
    - secretKey: secretKey
      remoteRef:
        key: netbox-secret-key
        property: key
    - secretKey: superuserPassword
      remoteRef:
        key: netbox-superuser
        property: password
    - secretKey: superuserApiToken
      remoteRef:
        key: netbox-superuser
        property: api_token
    - secretKey: oidcClientSecret
      remoteRef:
        key: netbox-oidc
        property: client_secret
