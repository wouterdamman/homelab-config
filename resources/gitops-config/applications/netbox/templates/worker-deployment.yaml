{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbox-worker
  namespace: netbox
  labels:
    app.kubernetes.io/name: netbox-worker
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: netbox-worker
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbox-worker
        app.kubernetes.io/component: worker
    spec:
      containers:
      - name: netbox-worker
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/opt/netbox/venv/bin/python", "/opt/netbox/netbox/manage.py", "rqworker"]
        env:
        # Database configuration
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: DB_PASSWORD
        # Redis configuration
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_PORT
        - name: REDIS_CACHE_HOST
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_HOST
        - name: REDIS_CACHE_PORT
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: REDIS_PORT
        # NetBox configuration
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: netbox-secrets
              key: SECRET_KEY
        - name: TIME_ZONE
          value: "{{ .Values.config.timeZone }}"
        volumeMounts:
        - name: media
          mountPath: /opt/netbox/netbox/media
        resources:
          {{- toYaml .Values.worker.resources | nindent 10 }}
      volumes:
      - name: media
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: netbox-media
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
