apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zigbee2mqtt-config
  namespace: zigbee2mqtt
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: zigbee2mqtt
    creationPolicy: Owner
    kind: ConfigMap
  data:
    - secretKey: configuration.yaml
      remoteRef:
        key: zigbee2mqtt-config
