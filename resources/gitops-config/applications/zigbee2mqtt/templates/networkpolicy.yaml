apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: zigbee2mqtt
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: zigbee2mqtt

  ingress:
  # Web UI — from svc-gateway (internal)
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  egress:
  # DNS — required for all name resolution
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

  # EMQX MQTT broker
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: emqx
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP

  # SLZB-06 TCP coordinator (LAN device, tcp://slzb-06.local:6638)
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "6638"
        protocol: TCP
