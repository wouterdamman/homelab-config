apiVersion: batch/v1
kind: Job
metadata:
  name: zigbee2mqtt-pv-fix
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: fix-pv
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          echo "Checking /app/data directory..."
          ls -la /app/data/ || true

          # Remove old secret.yaml if it exists and is a directory
          if [ -d /app/data/secret.yaml ]; then
            echo "Removing old secret.yaml directory..."
            rm -rf /app/data/secret.yaml
          fi

          # Create parent directory if needed
          mkdir -p /app/data

          echo "PV fix completed"
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: data-volume-zigbee2mqtt-0
