apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zigbee2mqtt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zigbee2mqtt.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zigbee2mqtt
  serviceName: {{ include "zigbee2mqtt.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "zigbee2mqtt.labels" . | nindent 8 }}
        app: zigbee2mqtt
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: copy-config
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "Copying configuration from secret to data volume..."
          cp /app/readonly/configuration.yaml /app/data/configuration.yaml
          echo "Configuration copied successfully"
          ls -la /app/data/
        volumeMounts:
        - name: config-volume
          mountPath: /app/readonly
          readOnly: true
        - name: data-volume
          mountPath: /app/data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      containers:
      - name: zigbee2mqtt
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        env:
        - name: Z2M_ONBOARD_NO_SERVER
          value: "1"
        - name: TZ
          value: UTC
        ports:
        - containerPort: 8080
          name: web
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: web
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        resources:
          {{- toYaml .Values.statefulset.resources | nindent 10 }}
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_ADMIN
      volumes:
      - name: config-volume
        secret:
          secretName: zigbee2mqtt-config
  {{- if .Values.statefulset.storage.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: {{ .Values.statefulset.storage.storageClassName }}
      resources:
        requests:
          storage: {{ .Values.statefulset.storage.size }}
  {{- end }}
