image:
  tag: 2.6.2

zigbee2mqtt:
  timezone: Europe/Amsterdam
  frontend:
    port: 8080

statefulset:
  dnsPolicy: ClusterFirst
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  storage:
    enabled: true
    size: 2Gi
    storageClassName: longhorn-standard

secretesMigratorContainer:
  repository: mikefarah/yq
  tag: 4.40.5
  securityContext: {}

externalSecrets:
  enabled: true
  items:
  - name: zigbee2mqtt-config
    secretStoreRef: onepassword-connect
    data:
    - remoteKey: zigbee2mqtt-config
      secretKey: configuration.yaml

service:
  annotations: {}
  type: ClusterIP
  port: 8080

httproutes:
- enabled: true
  name: zigbee-httproute
  namespace: zigbee2mqtt
  hostname: zigbee.app.damman.tech
  path: /
  gateway:
    name: app-gateway
    namespace: kube-system
    sectionName: app-https-listener
  backend:
    name: zigbee2mqtt
    port: 8080
