image:
  repository: koenkk/zigbee2mqtt
  tag: "2.9.2@sha256:2a21bbf7a664a149024bbe1f776e3151f28ed9db15948270dcbffb89544a41f0"

service:
  type: ClusterIP

namespaceLabels:
  gateway.damman.tech/svc-gateway: "true"

networkPolicy:
  cilium:
    enabled: true
  prometheusNamespace: monitoring
  mqttNamespace: emqx
  extraEgress:
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "6638"
        protocol: TCP

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  size: 2Gi
  storageClassName: longhorn-standard

externalSecrets:
  enabled: false
  items:
  - name: zigbee2mqtt-config
    secretStoreRef: onepassword-connect
    remoteKey: zigbee2mqtt-config
    secretKey: configuration.yaml

httproutes:
- enabled: true
  name: zigbee-httproute
  namespace: zigbee2mqtt
  hostname: zigbee.svc.damman.tech
  path: /
  gateway:
    name: svc-gateway
    namespace: kube-system
    sectionName: svc-https-listener
  backend:
    name: zigbee2mqtt
    port: 8080
