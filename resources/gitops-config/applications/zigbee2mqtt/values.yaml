image:
  repository: koenkk/zigbee2mqtt
  tag: 2.9.2@sha256:2a21bbf7a664a149024bbe1f776e3151f28ed9db15948270dcbffb89544a41f0

service:
  type: ClusterIP

configmap:
  enabled: false

statefulset:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  storage:
    enabled: true
    size: 2Gi
    storageClassName: longhorn-standard
  secrets:
    name: ""

externalSecrets:
  enabled: true
  items:
  - name: zigbee2mqtt-config
    secretStoreRef: onepassword-connect
    data:
    - remoteKey: zigbee2mqtt-config
      secretKey: configuration.yaml

httproutes:
- enabled: true
  name: zigbee-httproute
  namespace: zigbee2mqtt
  hostname: zigbee.svc.damman.tech
  path: /
  gateway:
    name: svc-gateway
    namespace: kube-system
    sectionName: svc-https-listener
  backend:
    name: zigbee2mqtt
    port: 8080
