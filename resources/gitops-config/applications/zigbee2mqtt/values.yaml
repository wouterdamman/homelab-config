image:
  repository: koenkk/zigbee2mqtt
  tag: 2.8.0

service:
  type: ClusterIP

secretesMigratorContainer:
  repository: mikefarah/yq
  tag: 4.40.5

configmap:
  enabled: false

statefulset:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  storage:
    enabled: true
    size: 2Gi
    storageClassName: longhorn-standard
  secrets:
    name: ""

externalSecrets:
  enabled: true
  items:
  - name: zigbee2mqtt-config
    secretStoreRef: onepassword-connect
    data:
    - remoteKey: zigbee2mqtt-config
      secretKey: configuration.yaml

httproutes:
- enabled: true
  name: zigbee-httproute
  namespace: zigbee2mqtt
  hostname: zigbee.app.damman.tech
  path: /
  gateway:
    name: app-gateway
    namespace: kube-system
    sectionName: app-https-listener
  backend:
    name: zigbee2mqtt
    port: 8080
