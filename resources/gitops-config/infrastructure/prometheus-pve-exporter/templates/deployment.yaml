apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app: pve-exporter
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: generate-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              # Extract token parts from full token string
              # Format: user@realm!tokenname=tokenvalue
              TOKEN_NAME=$(echo "${PVE_TOKEN_FULL}" | cut -d'!' -f2 | cut -d'=' -f1)
              TOKEN_VALUE=$(echo "${PVE_TOKEN_FULL}" | cut -d'=' -f2)

              cat > /config/pve.yml <<EOF
              default:
                user: ${PVE_USER}
                token_name: ${TOKEN_NAME}
                token_value: ${TOKEN_VALUE}
                verify_ssl: {{ .Values.proxmox.verify_ssl }}
              EOF

              echo "Generated config (token_value hidden):"
              cat /config/pve.yml | sed 's/token_value:.*/token_value: ***/'
          env:
            - name: PVE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: PVE_USER
            - name: PVE_TOKEN_FULL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: PVE_TOKEN_NAME
          volumeMounts:
            - name: config
              mountPath: /config
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      containers:
        - name: pve-exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9221
              protocol: TCP
          args:
            - "--config.file=/etc/pve-exporter/pve.yml"
            - "--web.listen-address=:9221"
          volumeMounts:
            - name: config
              mountPath: /etc/pve-exporter
              readOnly: true
          resources:
{{- toYaml .Values.resources | nindent 10 }}
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: config
          emptyDir: {}
