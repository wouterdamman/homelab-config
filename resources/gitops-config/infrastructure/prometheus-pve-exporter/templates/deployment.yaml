apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app: pve-exporter
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      initContainers:
      - name: generate-config
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          cat > /config/pve.yml <<EOF
          default:
            user: ${PVE_USER}
            token_name: ${PVE_TOKEN_NAME}
            verify_ssl: {{ .Values.proxmox.verify_ssl }}
          EOF
          cat /config/pve.yml
        env:
        - name: PVE_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.existingSecret }}
              key: PVE_USER
        - name: PVE_TOKEN_NAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.existingSecret }}
              key: PVE_TOKEN_NAME
        volumeMounts:
        - name: config
          mountPath: /config
      containers:
      - name: pve-exporter
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: metrics
          containerPort: 9221
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/pve-exporter
          readOnly: true
        args:
        - "--config.file=/etc/pve-exporter/pve.yml"
        - "--web.listen-address=:9221"
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: config
        emptyDir: {}
