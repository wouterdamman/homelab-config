apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app: pve-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: generate-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              cat > /config/pve.yml <<EOF
              default:
                user: ${PVE_USER}
                token_name: ${PVE_TOKEN_NAME}
                token_value: ${PVE_TOKEN_VALUE}
                verify_ssl: false
              EOF
              echo "Generated pve.yml (token hidden)"
          env:
            - name: PVE_USER
              valueFrom:
                secretKeyRef:
                  name: pve-exporter-credentials
                  key: PVE_USER
            - name: PVE_TOKEN_NAME
              valueFrom:
                secretKeyRef:
                  name: pve-exporter-credentials
                  key: PVE_TOKEN_NAME
            - name: PVE_TOKEN_VALUE
              valueFrom:
                secretKeyRef:
                  name: pve-exporter-credentials
                  key: PVE_TOKEN_VALUE
          volumeMounts:
            - name: config
              mountPath: /config
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      containers:
        - name: pve-exporter
          image: bcleonard/prometheus-pve-exporter:latest
          args:
            - "--config.file=/etc/pve-exporter/pve.yml"
            - "--web.listen-address=:9221"
          ports:
            - name: metrics
              containerPort: 9221
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/pve-exporter
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: config
          emptyDir: {}