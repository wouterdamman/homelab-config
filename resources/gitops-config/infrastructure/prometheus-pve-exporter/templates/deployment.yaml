apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app: pve-exporter
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      containers:
      - name: pve-exporter
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: metrics
          containerPort: 9221
          protocol: TCP
        env:
        - name: PVE_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.existingSecret }}
              key: username
        - name: PVE_TOKEN_NAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.existingSecret }}
              key: token-name
        - name: PVE_TOKEN_VALUE
          valueFrom:
            secretKeyRef:
              name: {{ .Values.existingSecret }}
              key: token-value
        - name: PVE_VERIFY_SSL
          value: "{{ .Values.proxmox.verify_ssl }}"
        args:
        - "--target.url={{ .Values.proxmox.endpoint }}"
        - "--web.listen-address=:9221"
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 10
