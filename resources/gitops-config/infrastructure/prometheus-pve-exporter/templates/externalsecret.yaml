apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pve-exporter-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: pve-exporter-credentials
    creationPolicy: Owner
  data:
  - secretKey: PVE_USER
    remoteRef:
      key: Proxmox - Monitoring Account
      property: username
  - secretKey: PVE_TOKEN_NAME
    remoteRef:
      key: Proxmox - Monitoring Account
      property: api_key
