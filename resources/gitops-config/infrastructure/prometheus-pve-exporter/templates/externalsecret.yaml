apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pve-exporter-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: pve-exporter-credentials
    creationPolicy: Owner
  data:
  - secretKey: PVE_USER
    remoteRef:
      key: Proxmox - Monitoring Account
      property: username
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: PVE_TOKEN_NAME
    remoteRef:
      key: Proxmox - Monitoring Account
      property: token-name
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: PVE_TOKEN_VALUE
    remoteRef:
      key: Proxmox - Monitoring Account
      property: token-value
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
