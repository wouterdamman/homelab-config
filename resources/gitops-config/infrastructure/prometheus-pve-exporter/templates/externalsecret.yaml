apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pve-exporter-secret
  namespace: monitoring
spec:
  secretStoreRef:
    name: onepassword-connect
    kind: SecretStore
  target:
    name: pve-exporter-secret
    creationPolicy: Owner
  data:
    - secretKey: tokenName
      remoteRef:
        key: Proxmox - Monitoring Account
        property: token_name
    - secretKey: tokenValue
      remoteRef:
        key: Proxmox - Monitoring Account
        property: api_key
