apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pve-exporter-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    release: prometheus
spec:
  groups:
  - name: proxmox
    interval: 60s
    rules:
    # CRITICAL ALERTS
    - alert: ProxmoxNodeDown
      expr: pve_node_info{status="online"} == 0
      for: 2m
      labels:
        severity: critical
        component: proxmox
      annotations:
        summary: "Proxmox node {{ $labels.node }} is down"
        description: "Node has been offline for more than 2 minutes. Cluster may lose quorum."

    - alert: ProxmoxClusterNoQuorum
      expr: pve_cluster_quorate == 0
      for: 1m
      labels:
        severity: critical
        component: proxmox
      annotations:
        summary: "Proxmox cluster lost quorum"
        description: "Cluster cannot make decisions. Check node and QDevice status immediately."

    - alert: ProxmoxStorageFull
      expr: (pve_storage_size_bytes - pve_storage_available_bytes) / pve_storage_size_bytes * 100 > 90
      for: 5m
      labels:
        severity: critical
        component: proxmox
      annotations:
        summary: "Proxmox storage {{ $labels.id }} is >90% full"
        description: "Storage {{ $labels.id }} on {{ $labels.node }} is at {{ $value | humanizePercentage }}."

    # WARNING ALERTS
    - alert: ProxmoxHighCPU
      expr: 100 - pve_node_cpu_idle_ratio * 100 > 80
      for: 10m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "Proxmox node {{ $labels.node }} high CPU usage"
        description: "CPU usage is {{ $value | humanize }}% for 10+ minutes."

    - alert: ProxmoxHighMemory
      expr: pve_node_memory_used_bytes / pve_node_memory_size_bytes * 100 > 90
      for: 10m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "Proxmox node {{ $labels.node }} high memory usage"
        description: "Memory usage is {{ $value | humanizePercentage }} for 10+ minutes."

    - alert: ProxmoxVMDown
      expr: pve_vm_status{status="running"} == 0
      for: 5m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "VM {{ $labels.name }} ({{ $labels.vmid }}) is down"
        description: "VM has been stopped/crashed for 5+ minutes."

    # QDEVICE ALERTS (added for ADR-027)
    - alert: ProxmoxQDeviceUnreachable
      expr: absent(pve_qdevice_info) or (pve_qdevice_info{state="active"} == 0)
      for: 5m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "Proxmox QDevice unreachable or inactive"
        description: "QDevice is not providing votes. Check LXC 200 status."
