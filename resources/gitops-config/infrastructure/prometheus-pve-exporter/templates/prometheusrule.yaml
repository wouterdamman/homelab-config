apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pve-exporter-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    release: prometheus
spec:
  groups:
  - name: proxmox
    interval: 60s
    rules:

    - alert: ProxmoxNodeDown
      expr: pve_node_info{status="online"} == 0
      for: 2m
      labels:
        severity: critical
        component: proxmox
      annotations:
        summary: "Proxmox node {{`{{ $labels.node }}`}} is down"
        description: "Node offline >2m, quorum risk."

    - alert: ProxmoxClusterNoQuorum
      expr: pve_cluster_quorate == 0
      for: 1m
      labels:
        severity: critical
        component: proxmox
      annotations:
        summary: "Proxmox cluster lost quorum"
        description: "Cluster cannot make decisions."

    - alert: ProxmoxStorageFull
      expr: (pve_storage_size_bytes - pve_storage_available_bytes)
            / pve_storage_size_bytes * 100 > 90
      for: 5m
      labels:
        severity: critical
        component: proxmox
      annotations:
        summary: "Storage {{`{{ $labels.id }}`}} >90% full"
        description: "Storage usage at {{`{{ $value | humanizePercentage }}`}}."

    - alert: ProxmoxHighCPU
      expr: 100 - pve_node_cpu_idle_ratio * 100 > 80
      for: 10m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "High CPU on {{`{{ $labels.node }}`}}"
        description: "CPU >80% for 10m."

    - alert: ProxmoxHighMemory
      expr: pve_node_memory_used_bytes / pve_node_memory_size_bytes * 100 > 90
      for: 10m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "High memory on {{`{{ $labels.node }}`}}"
        description: "Memory >90% for 10m."

    - alert: ProxmoxVMDown
      expr: pve_vm_status{status="running"} == 0
      for: 5m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "VM {{`{{ $labels.name }}`}} is down"
        description: "VM stopped >5m."

    - alert: ProxmoxQDeviceUnreachable
      expr: absent(pve_qdevice_info) or pve_qdevice_info{state="active"} == 0
      for: 5m
      labels:
        severity: warning
        component: proxmox
      annotations:
        summary: "QDevice unreachable"
        description: "QDevice not providing votes."
