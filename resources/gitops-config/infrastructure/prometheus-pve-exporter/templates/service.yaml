apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: monitoring
  labels:
    app: pve-exporter
spec:
  type: {{ .Values.service.type }}
  selector:
    app: pve-exporter
  ports:
  - name: metrics
    port: {{ .Values.service.port }}
    targetPort: metrics
    protocol: TCP
