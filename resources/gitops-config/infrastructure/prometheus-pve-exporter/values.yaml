image:
  repository: prompve/prometheus-pve-exporter
  tag: "3.4.5"
  pullPolicy: IfNotPresent

replicaCount: 1

# Proxmox connection
proxmox:
  endpoint: "10.0.10.200" # IP van je Proxmox node
  verify_ssl: false

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Secret met token
existingSecret: "pve-exporter-credentials"

# Service config
service:
  type: ClusterIP
  port: 9221
  name: pve-exporter

# ServiceMonitor (Prometheus Operator)
serviceMonitor:
  enabled: true
  interval: 60s
  scrapeTimeout: 30s
  labels:
    release: prometheus
