prometheus-pve-exporter:
  replicaCount: 1

  env:
    pveAuthType: "password"
    pveUser: "monitoring@pve"
    pvePassword: ""
    pveExistingSecretName: "pve-exporter-secret"
    pveVerifySsl: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 80

  serviceMonitor:
    enabled: false
