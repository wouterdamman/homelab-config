prometheus-pve-exporter:
  replicaCount: 1

  env:
    pveAuthType: "password"
    pveUser: "monitoring@pve"
    pvePassword: ""
    pveExistingSecretName: "pve-exporter-secret"
    # Proxmox uses a self-signed certificate by default; adding the CA cert to the
    # container trust store is disproportionate for an internal scrape endpoint.
    # Accepted risk: connection is cluster-internal (10.0.10.x), no external exposure.
    pveVerifySsl: false

  resources:
    requests:
      cpu: 150m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 80

  serviceMonitor:
    enabled: false
