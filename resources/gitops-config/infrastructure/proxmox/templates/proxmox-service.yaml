---
# Service voor externe Proxmox server
# Maakt externe IP 10.0.10.200:8006 beschikbaar binnen Kubernetes
apiVersion: v1
kind: Service
metadata:
  name: proxmox
  namespace: infrastructure
  labels:
    app: proxmox
    app.kubernetes.io/name: proxmox
    app.kubernetes.io/component: external-service
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  ports:
    - name: https
      port: 8006
      targetPort: 8006
      protocol: TCP
---
# Endpoints voor externe Proxmox server
# Definieert het externe IP adres waar Proxmox bereikbaar is
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox
  namespace: infrastructure
  labels:
    app: proxmox
    app.kubernetes.io/name: proxmox
    app.kubernetes.io/component: external-service
subsets:
  - addresses:
      - ip: 10.0.10.200
    ports:
      - name: https
        port: 8006
        protocol: TCP
