---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-bootstrap-password
  namespace: authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: authentik-bootstrap-password
    template:
      engineVersion: v2
      type: Opaque
      data:
        password: '{{ "{{ .password }}" }}'
  data:
  - secretKey: password
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: authentik-admin
      metadataPolicy: None
      property: password
