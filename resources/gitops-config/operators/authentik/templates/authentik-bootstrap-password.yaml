# This password is used ONCE during initial Authentik bootstrap to create the akadmin account.
# After first login, Authentik stores the password hash in PostgreSQL and never reads this secret again.
# Rotating the value in 1Password has NO effect on the actual admin password.
# To rotate the admin password: use the Authentik UI (Admin -> Directory -> Users -> akadmin -> Set password).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-bootstrap-password
  namespace: authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: authentik-bootstrap-password
    template:
      engineVersion: v2
      type: Opaque
      data:
        password: '{{ "{{ .password }}" }}'
  data:
  - secretKey: password
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: authentik-admin
      metadataPolicy: None
      property: password
