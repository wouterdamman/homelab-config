---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-db-credentials
  namespace: authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: authentik-db-credentials
    template:
      engineVersion: v2
      type: Opaque
      data:
        username: '{{ "{{ .username }}" }}'
        password: '{{ "{{ .password }}" }}'
  data:
  - secretKey: username
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: cnpg-shared-authentik
      metadataPolicy: None
      property: username
  - secretKey: password
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: cnpg-shared-authentik
      metadataPolicy: None
      property: password
