---
# HTTPRoute for services gateway (infrastructure services)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-httproute-svc
  namespace: authentik
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: svc-gateway
      namespace: kube-system
      sectionName: svc-https-listener
  hostnames:
    - sso.svc.damman.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: authentik-server
          port: 80
          weight: 1
---
# HTTPRoute for applications gateway (user-facing applications)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-httproute-app
  namespace: authentik
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: app-gateway
      namespace: kube-system
      sectionName: app-https-listener
  hostnames:
    - sso.app.damman.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: authentik-server
          port: 80
          weight: 1
