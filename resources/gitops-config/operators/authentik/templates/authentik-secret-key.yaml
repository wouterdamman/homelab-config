# WARNING: refreshInterval is intentionally "0" (never auto-rotate).
# Rotating this key invalidates ALL active Authentik sessions and MFA devices cluster-wide.
# To rotate manually: drain active sessions in the Authentik UI, then:
#   kubectl delete secret authentik-secret-key -n authentik
# ESO will re-fetch from 1Password on the next sync.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secret-key
  namespace: authentik
spec:
  refreshInterval: "0"
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: authentik-secret-key
    template:
      engineVersion: v2
      type: Opaque
      data:
        secret-key: '{{ "{{ .secretKey }}" }}'
  data:
  - secretKey: secretKey
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: authentik-secret-key
      metadataPolicy: None
      property: secret-key
