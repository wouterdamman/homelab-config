---
# Dedicated certificate for authentik's own web server (built-in HTTPS
# listener, port 9443) — imported into Authentik and assigned to the
# default Brand so in-cluster callers hitting sso.app.damman.tech directly
# (bypassing the gateway) get a certificate that actually validates, instead
# of Authentik's self-signed bootstrap cert.
#
# Deliberately its own Certificate (not the app-gateway wildcard) — first
# step of splitting per-service certs out of the shared wildcard.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authentik-server-tls
  namespace: authentik
spec:
  dnsNames:
    - sso.app.damman.tech
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: authentik-server-tls
  usages:
    - digital signature
    - key encipherment
