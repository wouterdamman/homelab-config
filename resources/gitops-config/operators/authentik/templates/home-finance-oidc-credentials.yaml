---
# home-finance's OIDC client_secret, needed here (authentik namespace) so
# the home-finance-oidc-provider blueprint can inject it via !Env without
# hardcoding it in the blueprint YAML. Same 1Password item the home-finance
# chart's own ExternalSecret reads (resources/gitops-config/applications/home-finance).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-finance-oidc-credentials
  namespace: authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: home-finance-oidc
    template:
      engineVersion: v2
      type: Opaque
      data:
        client_secret: '{{ `{{ .clientSecret }}` }}'
  data:
  - secretKey: clientSecret
    remoteRef:
      key: home-finance-oidc
      property: client_secret
