---
# Declarative OAuth2 Provider + Application for home-finance — was created
# via a one-off Authentik API call during initial setup, which is why
# grant_types ended up empty (API default) and broke login after any
# redeploy would have wiped it entirely. This blueprint is idempotent and
# survives a full cluster rebuild: no manual Authentik UI/API step needed
# to get home-finance's OIDC login working again.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-home-finance-oidc-blueprint
  namespace: authentik
data:
  home-finance-oidc.yaml: |
    metadata:
      name: home-finance OAuth2 provider + application
    version: 1
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: home-finance
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: jxSJ2L0WqBe95qwGrQklWVjWelNvIqkrruFC1dw0
          client_secret: !Env HOME_FINANCE_OIDC_CLIENT_SECRET
          # Empty grant_types is what broke login the first time around
          # ("Invalid grant_type for provider" for authorization_code) —
          # explicit here so it can't silently regress again.
          grant_types:
            - authorization_code
            - refresh_token
          redirect_uris:
            - matching_mode: strict
              url: https://budget.app.damman.tech/auth/callback
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        state: present
        id: home-finance-provider
      - model: authentik_core.application
        identifiers:
          slug: home-finance
        attrs:
          name: Home Finance
          provider: !KeyOf home-finance-provider
        state: present
