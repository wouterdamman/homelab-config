# Authentik Configuration
# Chart: https://github.com/goauthentik/helm
# Docs: https://docs.goauthentik.io/

global:
  env:
  # PostgreSQL (external CNPG)
  - name: AUTHENTIK_POSTGRESQL__HOST
    value: "cnpg-shared-rw.cnpg-system.svc.cluster.local"
  - name: AUTHENTIK_POSTGRESQL__PORT
    value: "5432"
  - name: AUTHENTIK_POSTGRESQL__NAME
    value: "authentik"
  - name: AUTHENTIK_POSTGRESQL__USER
    valueFrom:
      secretKeyRef:
        name: authentik-db-credentials
        key: username
  - name: AUTHENTIK_POSTGRESQL__PASSWORD
    valueFrom:
      secretKeyRef:
        name: authentik-db-credentials
        key: password

  # Redis (bundled)
  - name: AUTHENTIK_REDIS__HOST
    value: "authentik-redis-master"
  - name: AUTHENTIK_REDIS__PORT
    value: "6379"

  # Secret key
  - name: AUTHENTIK_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: authentik-secret-key
        key: secret-key

  # Bootstrap admin
  - name: AUTHENTIK_BOOTSTRAP_PASSWORD
    valueFrom:
      secretKeyRef:
        name: authentik-bootstrap-password
        key: password

  # Privacy
  - name: AUTHENTIK_ERROR_REPORTING__ENABLED
    value: "false"

# ─────────────────────────────────────────────────────────────
# Server (UI + API)
# ─────────────────────────────────────────────────────────────
server:
  replicas: 2

  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    value: "true"
    effect: NoSchedule

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
              app.kubernetes.io/component: server
          topologyKey: kubernetes.io/hostname

  resources:
    requests:
      cpu: 100m
      memory: 640Mi
    limits:
      cpu: 750m
      memory: 1280Mi

  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 10

  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 5

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: prometheus

  ingress:
    enabled: false # Gateway API HTTPRoute in use

# ─────────────────────────────────────────────────────────────
# Worker (background tasks)
# ─────────────────────────────────────────────────────────────
worker:
  replicas: 2

  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    value: "true"
    effect: NoSchedule

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: authentik
            app.kubernetes.io/component: worker
        topologyKey: kubernetes.io/hostname

  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 2000m
      memory: 1024Mi

# ─────────────────────────────────────────────────────────────
# PostgreSQL (external CNPG)
# ─────────────────────────────────────────────────────────────
postgresql:
  enabled: false

# Redis - subchart removed in chart 2026.x, Authentik now handles Redis internally
