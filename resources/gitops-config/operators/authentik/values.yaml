# Authentik Configuration
# Chart: https://github.com/goauthentik/helm
# Docs: https://docs.goauthentik.io/

global:
  env:
  # PostgreSQL (external CNPG)
  - name: AUTHENTIK_POSTGRESQL__HOST
    value: "cnpg-shared-rw.cnpg-system.svc.cluster.local"
  - name: AUTHENTIK_POSTGRESQL__PORT
    value: "5432"
  - name: AUTHENTIK_POSTGRESQL__NAME
    value: "authentik"
  - name: AUTHENTIK_POSTGRESQL__USER
    valueFrom:
      secretKeyRef:
        name: authentik-db-credentials
        key: username
  - name: AUTHENTIK_POSTGRESQL__PASSWORD
    valueFrom:
      secretKeyRef:
        name: authentik-db-credentials
        key: password

  # Redis (bundled)
  - name: AUTHENTIK_REDIS__HOST
    value: "authentik-redis-master"
  - name: AUTHENTIK_REDIS__PORT
    value: "6379"

  # Secret key
  - name: AUTHENTIK_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: authentik-secret-key
        key: secret-key

  # Bootstrap admin
  - name: AUTHENTIK_BOOTSTRAP_PASSWORD
    valueFrom:
      secretKeyRef:
        name: authentik-bootstrap-password
        key: password

  # Privacy
  - name: AUTHENTIK_ERROR_REPORTING__ENABLED
    value: "false"

# ─────────────────────────────────────────────────────────────
# Server (UI + API)
# ─────────────────────────────────────────────────────────────
server:
  replicas: 1

  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    value: "true"
    effect: NoSchedule

  resources:
    requests:
      cpu: 100m
      memory: 640Mi
    limits:
      cpu: 750m
      memory: 1280Mi

  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 10

  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 5

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: prometheus

  ingress:
    enabled: false # Gateway API HTTPRoute in use

# ─────────────────────────────────────────────────────────────
# Worker (background tasks)
# ─────────────────────────────────────────────────────────────
worker:
  replicas: 1

  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    value: "true"
    effect: NoSchedule

  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      # No CPU limit to prevent throttling on background tasks
      memory: 768Mi

# ─────────────────────────────────────────────────────────────
# PostgreSQL (external CNPG)
# ─────────────────────────────────────────────────────────────
postgresql:
  enabled: false

# ─────────────────────────────────────────────────────────────
# Redis (bundled Bitnami)
# ─────────────────────────────────────────────────────────────
redis:
  enabled: true

  master:
    tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
      effect: NoSchedule

    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

    persistence:
      enabled: true
      storageClass: longhorn-standard
      size: 1Gi

  replica:
    replicaCount: 0
