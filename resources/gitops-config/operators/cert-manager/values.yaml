# cert-manager values
# Docs: https://cert-manager.io/docs/

# CRDs
crds:
  enabled: true
  keep: true

# Controller
replicaCount: 1

extraArgs:
  - --enable-gateway-api
  - --dns01-recursive-nameservers-only
  - --dns01-recursive-nameservers=1.1.1.1:53

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

podDnsConfig:
  nameservers:
    - "1.1.1.1"
    - "8.8.8.8"

# Prometheus metrics
prometheus:
  enabled: true
  servicemonitor:
    enabled: true
    labels:
      release: prometheus

# Webhook
webhook:
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 32Mi

# CA Injector
cainjector:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Startup API Check
startupapicheck:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi
