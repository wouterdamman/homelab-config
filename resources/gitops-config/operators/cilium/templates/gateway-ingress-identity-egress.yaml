apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: gateway-ingress-identity-egress
spec:
  # Cilium's Gateway API dataplane is the per-node agent's embedded Envoy. When a
  # backend pod (with its own restrictive CiliumNetworkPolicy) makes an outbound
  # call that gets routed through this cluster's own Gateway -- e.g. an in-cluster
  # OIDC client reaching an Authentik provider via the gateway's ClusterIP -- the
  # redirected hop is evaluated under the reserved "ingress" identity, not the
  # original pod's identity. No namespaced CiliumNetworkPolicy can grant this
  # (endpointSelector can't match a reserved identity), hence this cluster-wide
  # policy. Purely additive: only unblocks Gateway-proxied egress that every
  # namespaced policy already silently dropped.
  endpointSelector:
    matchLabels:
      reserved:ingress: ""
  egress:
  - toEntities:
    - world
    - cluster
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
      - port: "80"
        protocol: TCP
