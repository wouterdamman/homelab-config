---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-backup-validation
  namespace: cnpg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-backup-validation
rules:
  # CNPG Cluster and Backup CRD permissions
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "backups", "scheduledbackups"]
    verbs: ["list", "get", "create", "delete", "watch"]

  # Namespace permissions (for creating/deleting dynamic test namespaces)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list"]

  # Secret create-only (for copying S3 credentials into dynamic test namespace)
  # get/list is intentionally absent here — scoped to cnpg-system via Role below
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]

  # Pod permissions (for checking restore status and exec into primary in test namespace)
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]

  # Service permissions
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]

  # PVC permissions (clusters need storage)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]

  # ConfigMap permissions
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-backup-validation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-backup-validation
subjects:
  - kind: ServiceAccount
    name: cnpg-backup-validation
    namespace: cnpg-system
---
# Scoped secret read access — only the two secrets needed in cnpg-system
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-backup-validation
  namespace: cnpg-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["cnpg-s3-secret", "cnpg-backup-validation-pushover"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-backup-validation
  namespace: cnpg-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cnpg-backup-validation
subjects:
  - kind: ServiceAccount
    name: cnpg-backup-validation
    namespace: cnpg-system
