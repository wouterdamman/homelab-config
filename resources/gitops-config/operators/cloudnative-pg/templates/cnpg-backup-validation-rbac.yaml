---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-backup-validation
  namespace: cnpg-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-backup-validation
rules:
  # CNPG Cluster and Backup CRD permissions
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "backups", "scheduledbackups"]
    verbs: ["list", "get", "create", "delete", "watch"]

  # Namespace permissions (for creating/deleting test namespaces)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list"]

  # Secret permissions (for S3 credentials and Pushover)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create"]

  # Pod permissions (for checking cluster status)
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]

  # Service permissions
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]

  # PVC permissions (clusters need storage)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]

  # ConfigMap permissions
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-backup-validation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-backup-validation
subjects:
  - kind: ServiceAccount
    name: cnpg-backup-validation
    namespace: cnpg-system
