---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cnpg-homeassistant-6h-backup
  namespace: cnpg-system
spec:
  # Reference to the cluster
  cluster:
    name: cnpg-homeassistant

  # Every 6 hours at minute 0 (00:00, 06:00, 12:00, 18:00)
  # Format: second minute hour day month dayofweek
  schedule: "0 0 0,6,12,18 * * *"

  # Backup configuration
  backupOwnerReference: self
  immediate: false
  suspend: false
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io

  # Target for backup (prefer standby to reduce primary load)
  target: prefer-standby

  # Keep Backup CRs for 7 days (4 backups/day × 7 = 28 objects max)
  retentionPolicy: "7d"
