---
# Idempotent job to initialize authentik database and user
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-init-authentik
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-authentik
          image: postgres:16.4
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Initializing authentik database ==="

              # Wait for database
              until pg_isready -h cnpg-shared-rw -U postgres; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done

              # Initialize database and user
              psql -h cnpg-shared-rw -U postgres <<'EOSQL'
              -- Create database if not exists
              SELECT 'Checking authentik database...' AS status;
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'authentik') THEN
                  CREATE DATABASE authentik OWNER postgres;
                  RAISE NOTICE 'Created database: authentik';
                ELSE
                  RAISE NOTICE 'Database authentik already exists';
                END IF;
              END $$;

              -- Create user if not exists
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_user WHERE usename = 'authentik') THEN
                  CREATE USER authentik WITH LOGIN;
                  RAISE NOTICE 'Created user: authentik';
                ELSE
                  RAISE NOTICE 'User authentik already exists';
                END IF;
              END $$;

              -- Set password (always, even if user exists)
              ALTER USER authentik WITH PASSWORD :'AUTHENTIK_PASSWORD';

              -- Grant database privileges
              GRANT ALL PRIVILEGES ON DATABASE authentik TO authentik;

              SELECT 'Database privileges granted' AS status;
              EOSQL

              # Set schema permissions
              psql -h cnpg-shared-rw -U postgres -d authentik <<'EOSQL'
              SELECT 'Setting schema permissions...' AS status;

              GRANT ALL ON SCHEMA public TO authentik;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO authentik;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO authentik;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO authentik;

              -- Grant on existing objects
              GRANT ALL ON ALL TABLES IN SCHEMA public TO authentik;
              GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO authentik;
              GRANT ALL ON ALL FUNCTIONS IN SCHEMA public TO authentik;

              SELECT 'Schema permissions complete' AS status;
              EOSQL

              echo "=== Authentik initialization complete ==="
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnpg-shared-superuser
                  key: password
            - name: AUTHENTIK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnpg-shared-authentik
                  key: password
