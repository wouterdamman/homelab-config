---
# Idempotent job to initialize firefly database and user
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-init-firefly
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-firefly
          image: postgres:16.4
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Initializing firefly database ==="

              # Wait for database
              until pg_isready -h cnpg-shared-rw -U postgres; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done

              # Initialize database and user
              psql -h cnpg-shared-rw -U postgres <<'EOSQL'
              -- Create database if not exists
              SELECT 'Checking firefly database...' AS status;
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'firefly') THEN
                  CREATE DATABASE firefly OWNER postgres;
                  RAISE NOTICE 'Created database: firefly';
                ELSE
                  RAISE NOTICE 'Database firefly already exists';
                END IF;
              END $$;

              -- Create user if not exists
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_user WHERE usename = 'firefly') THEN
                  CREATE USER firefly WITH LOGIN;
                  RAISE NOTICE 'Created user: firefly';
                ELSE
                  RAISE NOTICE 'User firefly already exists';
                END IF;
              END $$;

              -- Set password (always, even if user exists)
              ALTER USER firefly WITH PASSWORD :'FIREFLY_PASSWORD';

              -- Grant database privileges
              GRANT ALL PRIVILEGES ON DATABASE firefly TO firefly;

              SELECT 'Database privileges granted' AS status;
              EOSQL

              # Set schema permissions
              psql -h cnpg-shared-rw -U postgres -d firefly <<'EOSQL'
              SELECT 'Setting schema permissions...' AS status;

              GRANT ALL ON SCHEMA public TO firefly;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO firefly;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO firefly;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO firefly;

              -- Grant on existing objects
              GRANT ALL ON ALL TABLES IN SCHEMA public TO firefly;
              GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO firefly;
              GRANT ALL ON ALL FUNCTIONS IN SCHEMA public TO firefly;

              SELECT 'Schema permissions complete' AS status;
              EOSQL

              echo "=== Firefly initialization complete ==="
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnpg-shared-superuser
                  key: password
            - name: FIREFLY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnpg-shared-firefly
                  key: password
