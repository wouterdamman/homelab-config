---
# Idempotent job to initialize firefly database and user
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-init-firefly
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: cnpg-init
      restartPolicy: Never
      containers:
        - name: init-firefly
          image: alpine/k8s:1.36.0
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Initializing firefly database ==="

              PRIMARY_POD=$(kubectl get pods -n cnpg-system -l cnpg.io/cluster=cnpg-shared,role=primary -o jsonpath='{.items[0].metadata.name}')
              if [ -z "$PRIMARY_POD" ]; then
                echo "ERROR: Could not find primary pod"
                exit 1
              fi
              echo "Using primary pod: $PRIMARY_POD"

              echo "Creating database if not exists..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c \
                "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'firefly') THEN CREATE DATABASE firefly OWNER postgres; RAISE NOTICE 'Created database: firefly'; ELSE RAISE NOTICE 'Database firefly already exists'; END IF; END \$\$;"

              echo "Granting privileges..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c \
                "GRANT ALL PRIVILEGES ON DATABASE firefly TO firefly;"

              echo "Setting schema permissions..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -d firefly -c \
                "GRANT ALL ON SCHEMA public TO firefly; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO firefly; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO firefly; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO firefly; GRANT ALL ON ALL TABLES IN SCHEMA public TO firefly; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO firefly; GRANT ALL ON ALL FUNCTIONS IN SCHEMA public TO firefly;"

              echo "=== Firefly initialization complete ==="
