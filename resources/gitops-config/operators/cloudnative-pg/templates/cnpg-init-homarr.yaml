---
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-init-homarr
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: cnpg-init
      restartPolicy: Never
      containers:
        - name: init-homarr
          image: alpine/k8s:1.36.0
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Initializing homarr database ==="

              PRIMARY_POD=$(kubectl get pods -n cnpg-system -l cnpg.io/cluster=cnpg-shared,role=primary -o jsonpath='{.items[0].metadata.name}')
              echo "Using primary pod: $PRIMARY_POD"

              HOMARR_PW=$(kubectl get secret cnpg-shared-homarr -n cnpg-system -o jsonpath='{.data.password}' | base64 -d)

              echo "Creating database if not exists..."
              DB_EXISTS=$(kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='homarr'")
              if [ "$DB_EXISTS" != "1" ]; then
                kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c "CREATE DATABASE homarr OWNER postgres;"
                echo "Created database: homarr"
              else
                echo "Database homarr already exists"
              fi

              echo "Creating user if not exists..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c \
                "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_user WHERE usename = 'homarr') THEN CREATE USER homarr WITH LOGIN; RAISE NOTICE 'Created user: homarr'; ELSE RAISE NOTICE 'User homarr already exists'; END IF; END \$\$;"

              echo "Granting privileges..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c \
                "GRANT ALL PRIVILEGES ON DATABASE homarr TO homarr;"

              echo "Setting user password..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c \
                "ALTER USER homarr WITH PASSWORD '$HOMARR_PW';"

              echo "Setting schema permissions..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -d homarr -c \
                "GRANT ALL ON SCHEMA public TO homarr; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO homarr; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO homarr; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO homarr; GRANT ALL ON ALL TABLES IN SCHEMA public TO homarr; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO homarr; GRANT ALL ON ALL FUNCTIONS IN SCHEMA public TO homarr;"

              echo "=== Homarr initialization complete ==="
