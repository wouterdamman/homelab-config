---
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-init-netbox
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: cnpg-init
      restartPolicy: Never
      containers:
        - name: init-netbox
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Initializing netbox database ==="

              PRIMARY_POD=$(kubectl get pods -n cnpg-system -l cnpg.io/cluster=cnpg-shared,role=primary -o jsonpath='{.items[0].metadata.name}')
              echo "Using primary pod: $PRIMARY_POD"

              NETBOX_PW=$(kubectl get secret cnpg-shared-netbox -n cnpg-system -o jsonpath='{.data.password}' | base64 -d)

              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres <<'EOSQL'
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'netbox') THEN
                  CREATE DATABASE netbox OWNER postgres;
                  RAISE NOTICE 'Created database: netbox';
                END IF;
              END $$;
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_user WHERE usename = 'netbox') THEN
                  CREATE USER netbox WITH LOGIN;
                  RAISE NOTICE 'Created user: netbox';
                END IF;
              END $$;
              GRANT ALL PRIVILEGES ON DATABASE netbox TO netbox;
              EOSQL

              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c "ALTER USER netbox WITH PASSWORD '$NETBOX_PW';"

              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -d netbox <<'EOSQL'
              GRANT ALL ON SCHEMA public TO netbox;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO netbox;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO netbox;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO netbox;
              GRANT ALL ON ALL TABLES IN SCHEMA public TO netbox;
              GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO netbox;
              GRANT ALL ON ALL FUNCTIONS IN SCHEMA public TO netbox;
              EOSQL

              echo "=== NetBox initialization complete ==="
