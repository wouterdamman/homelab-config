---
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-init-netbox
  namespace: cnpg-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: cnpg-init
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-netbox
          image: alpine/k8s:1.36.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Initializing netbox database ==="

              PRIMARY_POD=$(kubectl get pods -n cnpg-system -l cnpg.io/cluster=cnpg-shared,role=primary -o jsonpath='{.items[0].metadata.name}')
              echo "Using primary pod: $PRIMARY_POD"

              echo "Creating database if not exists..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c \
                "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'netbox') THEN CREATE DATABASE netbox OWNER postgres; RAISE NOTICE 'Created database: netbox'; ELSE RAISE NOTICE 'Database netbox already exists'; END IF; END \$\$;"

              echo "Granting privileges..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -c \
                "GRANT ALL PRIVILEGES ON DATABASE netbox TO netbox;"

              echo "Setting schema permissions..."
              kubectl exec -n cnpg-system "$PRIMARY_POD" -c postgres -- psql -U postgres -d netbox -c \
                "GRANT ALL ON SCHEMA public TO netbox; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO netbox; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO netbox; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO netbox; GRANT ALL ON ALL TABLES IN SCHEMA public TO netbox; GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO netbox; GRANT ALL ON ALL FUNCTIONS IN SCHEMA public TO netbox;"

              echo "=== NetBox initialization complete ==="
