---
# ServiceAccount for database init jobs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-init
  namespace: cnpg-system
---
# Role to allow pod exec
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-init
  namespace: cnpg-system
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list"]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-init
  namespace: cnpg-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cnpg-init
subjects:
  - kind: ServiceAccount
    name: cnpg-init
    namespace: cnpg-system
