apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-shared
  namespace: cnpg-system
spec:
  description: "Shared PostgreSQL cluster for small applications"
  imageName: ghcr.io/cloudnative-pg/postgresql:16.14@sha256:242c0a2e8e87fe0718e7a62ab06558f3659a0ce7a1a4bcf1d19ffd675016eff0
  instances: 2

  # PostgreSQL configuration
  postgresql:
    parameters:
      shared_buffers: "64MB"
      effective_cache_size: "192MB"
      maintenance_work_mem: "32MB"
      max_connections: "100"
      log_statement: "ddl"
      log_min_duration_statement: "1000"
    pg_hba:
      - host all all 10.0.0.0/8 scram-sha-256
      - host all all 192.168.0.0/16 scram-sha-256

  # Bootstrap with superuser from ExternalSecret
  # Note: Database and user initialization is handled by GitOps jobs (cnpg-init-*.yaml)
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: cnpg-shared-superuser

  # Superuser secret reference
  superuserSecret:
    name: cnpg-shared-superuser

  # Storage configuration
  storage:
    storageClass: longhorn-fast
    size: 5Gi

  # Resource configuration
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Backup via barman-cloud plugin (ObjectStore: cnpg-shared-backup)
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    enabled: true
    isWALArchiver: true
    parameters:
      barmanObjectName: cnpg-shared-backup

  # Monitoring
  monitoring:
    enablePodMonitor: true
    podMonitorMetricRelabelings:
      - action: replace
        sourceLabels: [cluster]
        targetLabel: cnpg_cluster

  # Role management - CNPG sets passwords directly from secrets, no shell interpolation
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: cnpg-shared-authentik
      - name: firefly
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: cnpg-shared-firefly
      - name: homarr
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: cnpg-shared-homarr
      - name: netbox
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: cnpg-shared-netbox

  # Affinity - prefer different nodes for replicas
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: preferred
