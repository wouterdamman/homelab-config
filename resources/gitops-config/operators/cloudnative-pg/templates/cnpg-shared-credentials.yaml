---
# Superuser credentials for cnpg-shared cluster
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-shared-superuser-credentials
  namespace: cnpg-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: cnpg-shared-superuser
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: '{{ `{{ .username }}` }}'
        password: '{{ `{{ .password }}` }}'
  data:
  - secretKey: username
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: cnpg-shared-superuser
      metadataPolicy: None
      property: username
  - secretKey: password
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: cnpg-shared-superuser
      metadataPolicy: None
      property: password
