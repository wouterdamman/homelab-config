# CNPG operator — manages PostgreSQL clusters, serves admission webhook
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  ingress:
  # Admission webhooks from kube-apiserver (Talos: static pod in host network → cluster entity)
  - fromEntities:
    - cluster
    toPorts:
    - ports:
      - port: "9443"
        protocol: TCP
  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  # PostgreSQL instance status polling (https://:8000/pg/status)
  # No namespace filter — operator manages clusters cluster-wide (watchNamespace: "")
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/name: postgresql
    toPorts:
    - ports:
      - port: "8000"
        protocol: TCP
  # barman-cloud plugin sidecar communication
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: cnpg-system
        app: barman-cloud
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
---
# barman-cloud plugin Deployment — receives plugin calls from CNPG operator
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: barman-cloud
  namespace: cnpg-system
spec:
  endpointSelector:
    matchLabels:
      app: barman-cloud
  ingress:
  # CNPG operator plugin calls
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: cnpg-system
        app.kubernetes.io/name: cloudnative-pg
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
  # Prometheus scraping
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  # Hetzner Object Storage — WAL archiving
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
---
# PostgreSQL instances — cnpg-shared + cnpg-homeassistant clusters
# Each pod has 3 containers: postgres, bootstrap-controller, plugin-barman-cloud (sidecar)
# The plugin-barman-cloud sidecar archives WALs directly to Hetzner S3
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: postgresql
  namespace: cnpg-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/managed-by: cloudnative-pg
  ingress:
  # Authentik → cnpg-shared
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: authentik
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  # Home Assistant → cnpg-homeassistant
  # HA uses hostNetwork:true, so Cilium assigns reserved:host/remote-node identity cross-node.
  # fromEndpoints namespace match only works same-node; remote-node covers cross-node hostNetwork traffic.
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: home-assistant
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  - fromEntities:
    - remote-node
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  # home-finance → cnpg-shared
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: home-finance
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  # Disabled apps (homarr, netbox) → cnpg-shared — pre-allowed for when re-enabled
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: homarr
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: netbox
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  # Intra-namespace: replication between instances + backup-validation job + operator status
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: cnpg-system
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
      - port: "8000"
        protocol: TCP
  # Prometheus scraping (postgres-exporter metrics)
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "9187"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  # Replication between PostgreSQL instances within the cluster
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: cnpg-system
        app.kubernetes.io/name: postgresql
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  # plugin-barman-cloud sidecar → Hetzner S3 for WAL archiving + barman-cloud plugin service
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  # plugin-barman-cloud sidecar → barman-cloud plugin Deployment
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: cnpg-system
        app: barman-cloud
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
