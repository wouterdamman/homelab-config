apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        log . {
            class error
        }
        prometheus :9153

        # In-cluster pods hairpinning back through app-gateway's L2-announced VIP
        # (10.0.10.241) or its ClusterIP to reach an app behind the same Gateway
        # get a hard 403 from Cilium's Gateway dataplane (anti-hairpin protection),
        # regardless of NetworkPolicy -- confirmed via Hubble across several
        # attempts (see git history on the emqx app). Native OIDC was abandoned
        # for EMQX because of this (its client can't route around the hairpin).
        # This rewrite sends in-cluster traffic for the SSO hostname straight to
        # Authentik's own Service, skipping the Gateway/Envoy entirely. EMQX's
        # one remaining server-side call (SAML IdP metadata fetch, at SSO config
        # save time) uses this to fetch metadata over plain HTTP; the resulting
        # metadata still advertises sso.app.damman.tech (Authentik builds its
        # response URLs from the request's Host header, which this rewrite
        # preserves), so the actual login redirect still goes out over the real
        # public Gateway path. External/browser DNS resolution is untouched
        # (different DNS server).
        rewrite name sso.app.damman.tech authentik-server.authentik.svc.cluster.local

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
