apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  endpointSelector: {}

  ingress:
  # Admission webhook — kube-apiserver calls ESO webhook for ExternalSecret validation
  - fromEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "10250"
        protocol: TCP

  # Prometheus scraping — all three components expose metrics on 8080
  - fromEndpoints:
    - matchLabels:
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

  # kube-apiserver — controllers watch/reconcile ExternalSecrets and Secrets
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP

  # 1Password Connect API
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: onepassword
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
