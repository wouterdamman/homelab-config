installCRDs: false

# Controller (main component)
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Webhook
webhook:
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 20m
      memory: 32Mi

# Cert Controller
certController:
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 20m
      memory: 32Mi

# Prometheus metrics
serviceMonitor:
  enabled: true
  additionalLabels:
    release: prometheus
