# Loki values
# Docs: https://github.com/grafana/loki/tree/main/production/helm/loki

# Deploy mode: single binary (simple, good for homelab)
deploymentMode: SingleBinary

loki:
  # Authentication disabled (internal use only)
  auth_enabled: false

  # Common config
  commonConfig:
    replication_factor: 1

  # Schema config
  schemaConfig:
    configs:
      - from: "2025-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Storage config - filesystem (local PVC)
  storage:
    type: filesystem

  # Limits config
  limits_config:
    retention_period: 336h  # 14 days
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    max_streams_per_user: 10000
    max_query_series: 500

  # Compactor for retention
  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem

# Single binary config
singleBinary:
  replicas: 1

  persistence:
    enabled: true
    storageClass: longhorn-standard
    size: 30Gi

  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
      effect: NoSchedule

# Disable components not needed for single binary
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Gateway disabled (access via service directly)
gateway:
  enabled: false

# Chunk cache disabled (small scale)
chunksCache:
  enabled: false

# Results cache disabled (small scale)
resultsCache:
  enabled: false

# Monitoring
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus

  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

  lokiCanary:
    enabled: false

# Test disabled
test:
  enabled: false
