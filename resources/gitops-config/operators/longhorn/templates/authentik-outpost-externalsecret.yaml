---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-outpost-longhorn-token
  namespace: longhorn-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: authentik-outpost-longhorn-token
  data:
  - secretKey: token
    remoteRef:
      key: authentik-outpost-longhorn
      property: token
