apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: onepassword-connect
  namespace: onepassword
spec:
  endpointSelector: {}

  ingress:
  # 1Password Connect API — only External Secrets Operator
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: external-secrets
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  egress:
  # DNS
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

  # 1Password cloud API (sync)
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
