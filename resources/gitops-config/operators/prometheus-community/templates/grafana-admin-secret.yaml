---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: grafana-admin-secret
    template:
      engineVersion: v2
      type: Opaque
      data:
        admin-user: admin
        admin-password: '{{ `{{ .password }}` }}'
  data:
  - secretKey: password
    remoteRef:
      key: grafana-admin
      property: password
