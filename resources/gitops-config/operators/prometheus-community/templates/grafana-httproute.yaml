apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-httproute
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: Gateway
      name: svc-gateway
      namespace: kube-system
      sectionName: svc-https-listener
  hostnames:
    - grafana.svc.damman.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''	
          kind: Service
          name: prometheus-community-grafana
          port: 80
          weight: 1