---
# Grafana OIDC via Authentik
# Setup steps:
#   1. Authentik admin → Providers → Create OAuth2/OpenID Connect provider:
#        - Name: grafana, Client type: Confidential
#        - Redirect URI: https://grafana.svc.damman.tech/login/generic_oauth
#        - Scopes: openid, email, profile
#   2. Authentik admin → Applications → Create app linked to the provider
#   3. Update 1Password item "grafana-oidc" (KubernetesSecrets vault):
#        - client_id: <value from Authentik provider>
#        - client_secret: <value from Authentik provider>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    name: grafana-oidc-secret
    template:
      engineVersion: v2
      type: Opaque
      data:
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID: '{{ `{{ .client_id }}` }}'
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: '{{ `{{ .client_secret }}` }}'
  data:
  - secretKey: client_id
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: grafana-oidc
      property: client_id
  - secretKey: client_secret
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: grafana-oidc
      property: client_secret
