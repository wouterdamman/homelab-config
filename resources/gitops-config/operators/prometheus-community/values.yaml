# kube-prometheus-stack values
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

# Global settings
fullnameOverride: prometheus

# Prometheus
prometheus:
  prometheusSpec:
    retention: 14d
    retentionSize: "30GB"

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-monitoring
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 40Gi

    # Resources
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2048Mi

    # Tolerations for control-plane
    tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
      effect: NoSchedule
    # Scrape interval - 60s is voldoende voor homelab alerting/debugging
    scrapeInterval: "60s"
    evaluationInterval: "60s"

    # Override exporter timestamps to avoid out-of-order sample drops
    overrideHonorTimestamps: true

    # Service monitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Sluit kube-system (Cilium/Hubble - hoge cardinality) en kubelet-serving-cert-approver uit
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kubelet-serving-cert-approver

# Alertmanager
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-standard
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      value: "true"
      effect: NoSchedule
    # Mount secrets for Alertmanager receivers
    secrets:
    - alertmanager-pushover-secret
    - alertmanager-healthchecks-secret

  # Alertmanager config - Pushover integration
  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: [ 'alertname', 'namespace' ]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'pushover-warning'
      routes:
      # Watchdog pings healthchecks.io every 30m as dead man's switch
      - receiver: 'healthchecks-watchdog'
        repeat_interval: 30m
        matchers:
        - alertname = "Watchdog"
      # InfoInhibitor goes to null
      - receiver: 'null'
        matchers:
        - alertname = "InfoInhibitor"
      # Critical alerts
      - receiver: 'pushover-critical'
        matchers:
        - severity = "critical"
      # Warning alerts (default)
      - receiver: 'pushover-warning'
        matchers:
        - severity = "warning"

    receivers:
    # Dead man's switch — pings healthchecks.io every 30m; silence = monitoring down
    - name: 'healthchecks-watchdog'
      webhook_configs:
      - url_file: /etc/alertmanager/secrets/alertmanager-healthchecks-secret/ping-url
        send_resolved: false

    # Null receiver for alerts we don't want to send
    - name: 'null'

    - name: 'pushover-critical'
      pushover_configs:
      - user_key_file: /etc/alertmanager/secrets/alertmanager-pushover-secret/user-key
        token_file: /etc/alertmanager/secrets/alertmanager-pushover-secret/api-token
        priority: 1
        title: '{{ template "pushover.title" . }}'
        message: '{{ template "pushover.message" . }}'

    - name: 'pushover-warning'
      pushover_configs:
      - user_key_file: /etc/alertmanager/secrets/alertmanager-pushover-secret/user-key
        token_file: /etc/alertmanager/secrets/alertmanager-pushover-secret/api-token
        priority: 0
        title: '{{ template "pushover.title" . }}'
        message: '{{ template "pushover.message" . }}'

    templates:
    - '/etc/alertmanager/config/*.tmpl'

  # Custom templates
  templateFiles:
    pushover.tmpl: |-
      {{ define "pushover.title" }}[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}{{ end }}
      {{ define "pushover.message" }}{{ range .Alerts }}{{ .Annotations.summary }}
      {{ .Annotations.description }}
      {{ end }}{{ end }}

# Grafana
grafana:
  enabled: true

  # Admin credentials from ExternalSecret
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  # Persistence
  persistence:
    enabled: true
    storageClassName: longhorn-standard
    size: 5Gi

  # Resources
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  # Tolerations
  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    value: "true"
    effect: NoSchedule

  # OIDC credentials injected as env vars; optional so Grafana starts before Authentik is configured
  envFrom:
  - secretRef:
      name: grafana-oidc-secret
      optional: true

  # Grafana.ini settings
  grafana.ini:
    server:
      root_url: https://grafana.svc.damman.tech
    auth:
      disable_login_form: false
    auth.anonymous:
      enabled: false
    auth.generic_oauth:
      enabled: true
      name: Authentik
      allow_sign_up: true
      use_pkce: true
      scopes: openid email profile
      auth_url: https://sso.svc.damman.tech/application/o/authorize/
      token_url: https://sso.svc.damman.tech/application/o/token/
      api_url: https://sso.svc.damman.tech/application/o/userinfo/
      signout_redirect_url: https://sso.svc.damman.tech/application/o/grafana/end-session/
      client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      role_attribute_path: "'Admin'"

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Europe/Amsterdam

  # Additional data sources (Loki)
  additionalDataSources:
  - name: Loki
    type: loki
    url: http://loki.monitoring:3100
    access: proxy
    isDefault: false
  # Sidecar for dashboard discovery
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true

# Kubelet - disable probes endpoint, allowlist alleen essentiële cadvisor metrics
# Reduceert series van ~275k naar geschatte ~60-80k
kubelet:
  serviceMonitor:
    probes: false
    cAdvisorMetricRelabelings:
      # Drop hoge-cardinality id-label
      - action: labeldrop
        regex: id
      # Allowlist: behoud alleen essentiële metrics voor alerting/debugging
      - sourceLabels: [__name__]
        regex: >-
          container_(cpu_usage_seconds_total|cpu_cfs_periods_total|cpu_cfs_throttled_periods_total|cpu_cfs_throttled_seconds_total|memory_working_set_bytes|memory_usage_bytes|memory_rss|memory_cache|network_receive_bytes_total|network_transmit_bytes_total|network_receive_errors_total|network_transmit_errors_total|fs_usage_bytes|fs_limit_bytes|oom_events_total|start_time_seconds|scrape_error)
        action: keep

# Prometheus Node Exporter
prometheus-node-exporter:
  tolerations:
  - effect: NoSchedule
    operator: Exists
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Kube State Metrics
kube-state-metrics:
  tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    value: "true"
    effect: NoSchedule
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# etcd metrics - Talos exposes etcd metrics on port 2381
kubeEtcd:
  enabled: true
  endpoints:
  - 10.0.10.130
  - 10.0.10.131
  - 10.0.10.132
  service:
    enabled: true
    port: 2381
    targetPort: 2381
  serviceMonitor:
    enabled: true
    scheme: http
    # insecureSkipVerify removed: scheme is http, TLS is not in use, field had no effect
# kube-controller-manager and kube-scheduler metrics
# On Talos, these bind to 127.0.0.1 by default. We've configured them to bind to 0.0.0.0
# in the Talos machine config. Endpoints are discovered via control-plane node IPs.
kubeControllerManager:
  enabled: false # Niet nuttig voor homelab alerting
kubeScheduler:
  enabled: false # Niet nuttig voor homelab alerting
kubeProxy:
  enabled: false # Using Cilium kube-proxy replacement
