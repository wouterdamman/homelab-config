# Promtail values
# Docs: https://github.com/grafana/helm-charts/tree/main/charts/promtail

# Loki endpoint - only override clients, use default scrape configs
config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push

# DaemonSet runs on all nodes
daemonSet:
  enabled: true

# Resources
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Tolerations to run on all nodes including control-plane
tolerations:
  - effect: NoSchedule
    operator: Exists

# Security context
containerSecurityContext:
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false

# Service monitor for Prometheus
serviceMonitor:
  enabled: true
  labels:
    release: prometheus
