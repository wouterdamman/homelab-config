# Promtail values
# Docs: https://github.com/grafana/helm-charts/tree/main/charts/promtail

# Loki endpoint
config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push

  # Scrape configs
  snippets:
    pipelineStages:
      - cri: {}
    common:
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_node_name
        target_label: node_name
      - action: replace
        source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - action: replace
        source_labels:
          - __meta_kubernetes_container_name
        target_label: container

# DaemonSet runs on all nodes
daemonSet:
  enabled: true

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Tolerations to run on all nodes including control-plane
tolerations:
  - effect: NoSchedule
    operator: Exists

# Security context
containerSecurityContext:
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false

# Service monitor for Prometheus
serviceMonitor:
  enabled: true
  labels:
    release: prometheus
