# Promtail values
# Docs: https://github.com/grafana/helm-charts/tree/main/charts/promtail

# Loki endpoint - only override clients, use default scrape configs
config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push

# DaemonSet runs on all nodes
daemonSet:
  enabled: true

# Resources
resources:
  requests:
    cpu: 20m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

# Tolerations to run on all nodes including control-plane
tolerations:
  - effect: NoSchedule
    operator: Exists

# Pod runs as root — required to read host log files at /var/log/pods (owned by root:root).
# Running non-root would silently break log collection on nodes with restricted log permissions.
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  seccompProfile:
    type: RuntimeDefault

# Security context
containerSecurityContext:
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false

# Service monitor for Prometheus
serviceMonitor:
  enabled: true
  labels:
    release: prometheus
