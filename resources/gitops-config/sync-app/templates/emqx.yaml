---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: emqx
    app.kubernetes.io/component: iot
    app.kubernetes.io/part-of: smart-home
    homelab.damman.tech/tier: tier-3
    homelab.damman.tech/managed-by: argocd
  name: emqx
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  sources:
  - repoURL: https://repos.emqx.io/charts
    chart: emqx-enterprise
    targetRevision: 5.10.4
    helm:
      valueFiles:
      - $values/resources/gitops-config/applications/emqx/values.yaml
  - repoURL: https://github.com/wouterdamman/homelab-config
    targetRevision: HEAD
    path: resources/gitops-config/applications/emqx
    ref: values
  destination:
    namespace: emqx
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
