---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: home-finance
    app.kubernetes.io/component: finance
    app.kubernetes.io/part-of: personal-productivity
    homelab.damman.tech/tier: tier-4
    homelab.damman.tech/managed-by: argocd
  name: home-finance
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  sources:
    - repoURL: https://github.com/wouterdamman/home-finance
      path: deploy/helm/home-finance
      targetRevision: v1.8.0
      helm:
        valueFiles:
          - $values/resources/gitops-config/applications/home-finance/values.yaml
    - repoURL: https://github.com/wouterdamman/homelab-config
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/wouterdamman/homelab-config
      targetRevision: HEAD
      path: resources/gitops-config/applications/home-finance/manifests
  destination:
    namespace: home-finance
    server: https://kubernetes.default.svc
  syncPolicy:
    # No CreateNamespace=true: the chart owns its own Namespace resource
    # (templates/namespace.yaml, a PreSync hook with PSS/gateway labels).
    # Having both fight over the same object caused ArgoCD to prune+recreate
    # the whole namespace (and everything in it) on every single sync.
    automated:
      prune: true
      selfHeal: true
