---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: onepassword
  namespace: argocd 
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: operators
  source:
    repoURL: https://1password.github.io/connect-helm-charts
    chart: connect
    targetRevision: 2.1.1
    helm:
      values: |
        connect:
          credentialsName: onepassword-connect-credentials
          credentialsKey: onepassword-connect-credentials.json
          # API container resources
          api:
            resources:
              limits:
                cpu: 200m
                memory: 128Mi
              requests:
                cpu: 20m
                memory: 32Mi
          # Sync container resources
          sync:
            resources:
              limits:
                cpu: 200m
                memory: 128Mi
              requests:
                cpu: 20m
                memory: 32Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: onepassword
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true