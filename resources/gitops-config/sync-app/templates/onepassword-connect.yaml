---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: onepassword-connect
    app.kubernetes.io/component: secrets-management
    app.kubernetes.io/part-of: secrets-management
    homelab.damman.tech/tier: tier-1
    homelab.damman.tech/managed-by: argocd
  name: onepassword
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: operators
  sources:
    - repoURL: https://1password.github.io/connect-helm-charts
      chart: connect
      targetRevision: 2.2.0
      helm:
        valueFiles:
          - $values/resources/gitops-config/operators/onepassword-connect/values.yaml
    - repoURL: https://github.com/TheIronRock95/homelab-config
      targetRevision: HEAD
      path: resources/gitops-config/operators/onepassword-connect
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: onepassword
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
