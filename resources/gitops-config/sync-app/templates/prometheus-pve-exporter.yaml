apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-pve-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"  # After prometheus-community (wave 4)
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/wouterdeman/homelab-config.git
    path: resources/gitops-config/infrastructure/prometheus-pve-exporter
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=false  # Namespace already exists
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
